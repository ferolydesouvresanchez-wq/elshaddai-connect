    if (!form.name?.trim()) return;
    if (modal==='add') {
      updateData('groups', [...data.groups, { ...form, id:Date.now(), memberIds:form.memberIds||[] }]);
    } else {
      updateData('groups', data.groups.map(g=>g.id===form.id?form:g));
    }
    setModal(null);
  };

  const toggleMember = (memberId) => {
    setForm(f=>({
      ...f,
      memberIds: f.memberIds.includes(memberId) ? f.memberIds.filter(id=>id!==memberId) : [...f.memberIds, memberId]
    }));
  };

  // Course CRUD
  const canManageCourses = (groupId) => {
    if (isAdmin) return true;
    if (isLeader && String(currentUser.assignedGroupId) === String(groupId)) return true;
    return false;
  };

  const openAddCourse = () => {
    setCourseForm({ titulo:'', descripcion:'', activo: true });
    setCourseModal('add');
  };

  const openEditCourse = (c) => {
    setCourseForm({...c});
    setCourseModal('edit');
  };

  const handleSaveCourse = () => {
    if (!courseForm.titulo?.trim()) return;
    if (courseModal === 'add') {
      const newCourse = {
        ...courseForm, id: Date.now(), grupo_id: selectedGroup, lider_id: currentUser.id,
        fecha_creacion: today, activo: courseForm.activo !== false
      };
      updateData('courses', [...(data.courses||[]), newCourse]);
    } else {
      updateData('courses', (data.courses||[]).map(c => c.id === courseForm.id ? courseForm : c));
    }
    setCourseModal(null);
  };

  const toggleCourseActive = (courseId) => {
    updateData('courses', (data.courses||[]).map(c => c.id === courseId ? {...c, activo: !c.activo} : c));
  };

  const deleteCourse = (courseId) => {
    updateData('courses', (data.courses||[]).filter(c => c.id !== courseId));
    updateData('videoLessons', (data.videoLessons||[]).filter(v => v.curso_id !== courseId));
    updateData('videoProgress', (data.videoProgress||[]).filter(p => p.cursoId !== courseId));
    setCourseConfirm(null);
  };

  const groupColors = ['from-gold-700 to-gold-500','from-purple-800 to-purple-600','from-green-800 to-green-600','from-amber-800 to-amber-600','from-pink-800 to-rose-600','from-cyan-800 to-cyan-600'];

  // If viewing a specific course
  if (selectedCourse) {
    const course = (data.courses||[]).find(c => c.id === selectedCourse);
    if (!course) { setSelectedCourse(null); return null; }
    return <CourseDetail course={course} data={data} updateData={updateData} t={t} currentUser={currentUser} onBack={()=>setSelectedCourse(null)}/>;
  }

  // If viewing courses for a specific group
  if (selectedGroup) {
    const group = data.groups.find(g => g.id === selectedGroup);
    if (!group) { setSelectedGroup(null); return null; }
    const groupCourses = (data.courses||[]).filter(c => c.grupo_id === selectedGroup);
    const visibleCourses = isMember ? groupCourses.filter(c => c.activo) : groupCourses;
    const canManage = canManageCourses(selectedGroup);

    return (
      <div className="space-y-4 fade-in">
        <div className="card p-4">
          <div className="flex items-center gap-3 mb-3">
            <button onClick={()=>setSelectedGroup(null)} className="text-gold-400 hover:text-gold-500 flex items-center gap-1">
              <Icon name="arrow_left" size={18}/><span className="text-sm font-medium">{t.groups.title}</span>
            </button>
          </div>
          <div className="flex items-start justify-between">
            <div>
              <h2 className="text-xl font-bold text-gold-400 flex items-center gap-2"><Icon name="book" size={22}/>{t.courses.title} — {group.name}</h2>
              <p className="text-sm text-gray-500 mt-1">{visibleCourses.length} {t.courses.title.toLowerCase()}</p>
            </div>
            {canManage && <Btn variant="primary" onClick={openAddCourse}><Icon name="plus" size={16}/>{t.courses.newCourse}</Btn>}
          </div>
        </div>

        {visibleCourses.length === 0
          ? <div className="card"><EmptyState icon="book" message={t.courses.noCourses}/></div>
          : <div className="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-4">
              {visibleCourses.map(c => {
                const vCount = (data.videoLessons||[]).filter(v => v.curso_id === c.id).length;
                const creator = (data.users||[]).find(u => u.id === c.lider_id);
                const watched = (data.videoProgress||[]).filter(p => p.userId === currentUser?.id && p.cursoId === c.id).length;
                const pct = vCount > 0 ? Math.round((watched / vCount) * 100) : 0;
                return (
                  <div key={c.id} className="card overflow-hidden hover:shadow-lg transition-shadow border border-dark-700 cursor-pointer group" onClick={()=>setSelectedCourse(c.id)}>
                    <div className="bg-gradient-to-br from-dark-700 to-dark-800 p-5 relative">
                      <div className="absolute top-3 right-3">
                        <span className={`badge ${c.activo?'badge-green':'badge-gray'}`}>{c.activo?t.courses.active:t.courses.inactive}</span>
                      </div>
                      <div className="w-12 h-12 bg-gold-500/20 rounded-xl flex items-center justify-center mb-3">
                        <Icon name="book" size={24} className="text-gold-400"/>
                      </div>
                      <h4 className="font-bold text-lg text-white group-hover:text-gold-400 transition-colors">{c.titulo}</h4>
                      {c.descripcion && <p className="text-sm text-gray-500 mt-1 line-clamp-2">{c.descripcion}</p>}
                    </div>
                    <div className="p-4">
                      <div className="flex items-center gap-3 text-xs text-gray-500 mb-3">
                        <span><Icon name="video" size={13} className="inline mr-1"/>{vCount} {t.courses.totalVideos}</span>
                        {creator && <span><Icon name="user" size={13} className="inline mr-1"/>{creator.firstName}</span>}
                      </div>
                      {vCount > 0 && (
                        <div>
                          <div className="flex justify-between text-[10px] text-gray-500 mb-1">
                            <span>{t.courses.progress}</span><span>{pct}%</span>
                          </div>
                          <div className="progress-bar"><div className="progress-fill bg-gold-500" style={{width:`${pct}%`}}/></div>
                        </div>
                      )}
                      {canManage && (
                        <div className="flex gap-2 pt-3 mt-3 border-t border-dark-700" onClick={e=>e.stopPropagation()}>
                          <button onClick={()=>openEditCourse(c)} className="flex-1 text-center text-sm text-gold-400 font-medium py-1 hover:text-gold-500">{t.common.edit}</button>
                          <button onClick={()=>toggleCourseActive(c.id)} className="flex-1 text-center text-sm text-blue-400 font-medium py-1 hover:text-blue-500">{c.activo?t.courses.deactivate:t.courses.activate}</button>
                          <button onClick={()=>setCourseConfirm(c.id)} className="flex-1 text-center text-sm text-red-400 font-medium py-1 hover:text-red-500">{t.common.delete}</button>
                        </div>
                      )}
                    </div>
                  </div>
                );
              })}
            </div>
        }

        <Modal isOpen={!!courseModal} onClose={()=>setCourseModal(null)} title={courseModal==='add'?t.courses.newCourse:t.courses.editCourse} maxWidth="max-w-md">
          <div className="space-y-3">
            <Input label={t.courses.courseTitle} value={courseForm.titulo||''} onChange={v=>setCourseForm(f=>({...f,titulo:v}))} required/>
            <Textarea label={t.courses.courseDesc} value={courseForm.descripcion||''} onChange={v=>setCourseForm(f=>({...f,descripcion:v}))}/>
          </div>
          <div className="flex justify-end gap-3 mt-5">
            <Btn variant="ghost" onClick={()=>setCourseModal(null)}>{t.common.cancel}</Btn>
            <Btn variant="gold" onClick={handleSaveCourse}><Icon name="save" size={15}/>{t.common.save}</Btn>
          </div>
        </Modal>

        <ConfirmModal isOpen={!!courseConfirm} message={t.courses.confirmDeleteCourse}
          onConfirm={()=>deleteCourse(courseConfirm)} onCancel={()=>setCourseConfirm(null)} t={t}/>
      </div>
    );
  }

  // Default: Group list view
  return (
    <div className="space-y-4 fade-in">
      <div className="card p-4 flex justify-between items-center">
        <span className="text-sm text-gray-400">{visibleGroups.length} {t.common.total}</span>
        {!isLeader && !isMember && <Btn variant="primary" onClick={openAdd}><Icon name="plus" size={16}/>{t.groups.add}</Btn>}
      </div>

      {visibleGroups.length === 0
        ? <div className="card"><EmptyState icon="users" message={t.groups.noGroups}/></div>
        : <div className="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-4">
            {visibleGroups.map((g,i)=>{
              const groupMembers = data.members.filter(m=>g.memberIds.includes(m.id));
              const courseCount = (data.courses||[]).filter(c=>c.grupo_id===g.id && c.activo).length;
              return (
                <div key={g.id} className="card overflow-hidden hover:shadow-lg transition-shadow border border-dark-700">
                  <div className={`bg-gradient-to-br ${groupColors[i%groupColors.length]} p-5 text-white`}>
                    <h4 className="font-bold text-lg">{g.name}</h4>
                    <p className="text-white/70 text-sm mt-1">{g.leader || t.groups.noLeader}</p>
                    <div className="flex items-center gap-3 mt-3">
                      <span className="flex items-center gap-1 text-sm font-semibold"><Icon name="users" size={15}/>{g.memberIds.length} {t.groups.membersIn}</span>
                      {courseCount > 0 && <span className="flex items-center gap-1 text-sm font-semibold"><Icon name="book" size={15}/>{courseCount} {t.courses.title.toLowerCase()}</span>}
                    </div>
                  </div>
                  <div className="p-4">
                    {g.description && <p className="text-sm text-gray-500 mb-3">{g.description}</p>}
                    {groupMembers.length > 0 && (
                      <div className="flex -space-x-2 mb-3">
                        {groupMembers.slice(0,6).map(m=>(
                          <div key={m.id} title={`${m.firstName} ${m.lastName}`}
                            className="w-8 h-8 rounded-full bg-gradient-to-br from-gold-500 to-gold-700 border-2 border-dark-800 flex items-center justify-center text-dark-900 text-xs font-bold">
                            {m.firstName[0]}{m.lastName[0]}
                          </div>
                        ))}
                        {groupMembers.length > 6 && (
                          <div className="w-8 h-8 rounded-full bg-dark-700 border-2 border-dark-800 flex items-center justify-center text-gray-400 text-xs font-bold">+{groupMembers.length-6}</div>
                        )}
                      </div>
                    )}
                    <div className="flex gap-2 pt-3 border-t border-dark-700">
                      <button onClick={()=>setSelectedGroup(g.id)} className="flex-1 text-center text-sm text-blue-400 font-medium py-1 hover:text-blue-500 flex items-center justify-center gap-1"><Icon name="book" size={14}/>{t.courses.title}</button>
                      {!isMember && <button onClick={()=>{setForm({...g,memberIds:[...g.memberIds]});setModal('edit');}} className="flex-1 text-center text-sm text-gold-400 font-medium py-1 hover:text-gold-500">{t.common.edit}</button>}
                      {isAdmin && <button onClick={()=>setConfirm(g.id)} className="flex-1 text-center text-sm text-red-400 font-medium py-1 hover:text-red-500">{t.common.delete}</button>}
                    </div>
                  </div>
                </div>
              );
            })}
          </div>
      }

      <Modal isOpen={!!modal} onClose={()=>setModal(null)} title={modal==='add'?t.groups.add:t.groups.edit} maxWidth="max-w-xl">
        <div className="space-y-3">
          <Input label={t.groups.name} value={form.name||''} onChange={v=>setForm(f=>({...f,name:v}))} required/>
          <Input label={t.groups.leader} value={form.leader||''} onChange={v=>setForm(f=>({...f,leader:v}))}/>
          <Textarea label={t.groups.description} value={form.description||''} onChange={v=>setForm(f=>({...f,description:v}))}/>
          <div>
            <label className="text-sm font-medium text-gold-400 block mb-2">{t.groups.assignMembers}</label>
            <div className="border border-dark-600 rounded-lg divide-y divide-dark-700 max-h-48 overflow-y-auto bg-dark-900">
              {data.members.filter(m=>m.status==='active').map(m=>(
                <label key={m.id} className="flex items-center gap-3 px-3 py-2 cursor-pointer hover:bg-dark-700">
                  <input type="checkbox" checked={(form.memberIds||[]).includes(m.id)} onChange={()=>toggleMember(m.id)} className="rounded text-gold-500"/>
                  <div className="w-7 h-7 rounded-full bg-gradient-to-br from-gold-500 to-gold-700 flex items-center justify-center text-dark-900 text-xs font-bold">
                    {m.firstName[0]}{m.lastName[0]}
                  </div>
                  <span className="text-sm text-gray-300">{m.firstName} {m.lastName}</span>
                </label>
              ))}
              {data.members.filter(m=>m.status==='active').length===0 && (
                <div className="px-3 py-4 text-center text-sm text-gray-600">{t.common.noData}</div>
              )}
            </div>
          </div>
        </div>
        <div className="flex justify-end gap-3 mt-5">
          <Btn variant="ghost" onClick={()=>setModal(null)}>{t.common.cancel}</Btn>
          <Btn variant="gold" onClick={handleSave}><Icon name="save" size={15}/>{t.common.save}</Btn>
        </div>
      </Modal>

      <ConfirmModal isOpen={!!confirm} message={t.groups.confirmDelete}
        onConfirm={()=>{updateData('groups',data.groups.filter(g=>g.id!==confirm));setConfirm(null);}}
        onCancel={()=>setConfirm(null)} t={t}/>
    </div>
  );
};

// =====================================================================
// HELPERS: getUserName, createNotification, timeAgo
// =====================================================================
const getUserName = (userId, data) => {
  const u = (data.users||[]).find(u=>u.id===userId);
  return u ? `${u.firstName} ${u.lastName}` : '?';
};
const getUserInitials = (userId, data) => {
  const u = (data.users||[]).find(u=>u.id===userId);
  return u ? `${u.firstName?.[0]||''}${u.lastName?.[0]||''}` : '?';
};
const addNotification = (data, updateData, { userId, type, title, message, refId }) => {
  const n = { id:Date.now(), userId, type, title, message, refId, read:false, createdAt:new Date().toISOString() };
  updateData('notifications', [...(data.notifications||[]), n]);
};
const timeAgo = (dateStr) => {
  const diff = (Date.now() - new Date(dateStr).getTime()) / 1000;
  if (diff < 60) return 'now';
  if (diff < 3600) return `${Math.floor(diff/60)}m`;
  if (diff < 86400) return `${Math.floor(diff/3600)}h`;
  return `${Math.floor(diff/86400)}d`;
};

// =====================================================================
// NOTIFICATION BELL
// =====================================================================
const NotificationBell = ({ data, updateData, currentUser, t }) => {
  const [open, setOpen] = useState(false);
  const ref = useRef(null);
  useEffect(() => {
    const h = (e) => { if (ref.current && !ref.current.contains(e.target)) setOpen(false); };
    document.addEventListener('mousedown', h);
    return () => document.removeEventListener('mousedown', h);
  }, []);

  const notifs = (data.notifications||[]).filter(n => n.userId === currentUser?.id).sort((a,b) => new Date(b.createdAt)-new Date(a.createdAt));
  const unread = notifs.filter(n => !n.read).length;

  const markAllRead = () => {
    updateData('notifications', (data.notifications||[]).map(n => n.userId === currentUser?.id ? {...n, read:true} : n));
  };

  return (
    <div className="relative" ref={ref}>
      <button onClick={()=>setOpen(!open)} className="relative p-2 rounded-lg hover:bg-dark-700 text-gray-400 hover:text-white transition-colors">
        <Icon name="bell" size={20}/>
        {unread > 0 && <span className="absolute -top-0.5 -right-0.5 w-5 h-5 bg-red-500 text-white text-[10px] font-bold rounded-full flex items-center justify-center">{unread > 9 ? '9+' : unread}</span>}
      </button>
      {open && (
        <div className="absolute right-0 top-full mt-2 w-80 bg-dark-800 border border-dark-600 rounded-xl shadow-xl z-50 fade-in overflow-hidden">
          <div className="flex items-center justify-between px-4 py-3 border-b border-dark-700">
            <span className="font-bold text-white text-sm">{t.social.notifications}</span>
            {unread > 0 && <button onClick={markAllRead} className="text-xs text-gold-400 hover:text-gold-500">{t.social.markAllRead}</button>}
          </div>
          <div className="max-h-80 overflow-y-auto">
            {notifs.length === 0 ? (
              <div className="px-4 py-8 text-center text-sm text-gray-600">{t.social.noNotifications}</div>
            ) : notifs.slice(0,20).map(n => (
              <div key={n.id} className={`px-4 py-3 border-b border-dark-700 text-sm ${n.read ? 'opacity-60' : 'bg-gold-500/5'}`}>
                <div className="text-gray-300">{n.message}</div>
                <div className="text-[10px] text-gray-600 mt-1">{timeAgo(n.createdAt)}</div>
              </div>
            ))}
          </div>
        </div>
      )}
    </div>
  );
};

// =====================================================================
// FOLLOW SYSTEM (Module 2)
// =====================================================================
const FollowButton = ({ targetUserId, data, updateData, currentUser, t }) => {
  const follow = (data.follows||[]).find(f => f.followerId === currentUser?.id && f.followingId === targetUserId);
  const targetUser = (data.users||[]).find(u => u.id === targetUserId);
  const isPrivate = targetUser?.profileVisibility === 'private';

  if (targetUserId === currentUser?.id) return null;

  const handleFollow = (e) => {
    e.stopPropagation();
    if (follow) {
      updateData('follows', (data.follows||[]).filter(f => f.id !== follow.id));
    } else {
      const status = isPrivate ? 'pending' : 'accepted';
      updateData('follows', [...(data.follows||[]), { id:Date.now(), followerId:currentUser.id, followingId:targetUserId, status, createdAt:new Date().toISOString() }]);
      const msg = status === 'pending' ? t.social.requestedFollow : t.social.startedFollowing;
      addNotification(data, updateData, { userId:targetUserId, type:status==='pending'?'follow_request':'new_follower', title:t.social.followers, message:`${currentUser.firstName} ${msg}`, refId:currentUser.id });
    }
  };

  const label = follow ? (follow.status === 'pending' ? t.social.requested : t.social.following) : t.social.follow;
  const cls = follow ? (follow.status === 'pending' ? 'badge-yellow' : 'badge-green') : 'bg-gold-500/20 text-gold-400';

  return <button onClick={handleFollow} className={`badge ${cls} cursor-pointer hover:opacity-80`}>{label}</button>;
};

              <div className="flex-1 min-w-0">
                <div className="text-sm font-semibold text-white truncate">{u.firstName} {u.lastName}</div>

      <UserListModal isOpen={showList==='following'} onClose={()=>setShowList(null)} title={t.social.following} userIds={following.map(f=>f.followingId)} data={data} updateData={updateData} currentUser={currentUser} t={t}/>
    </Modal>

};

// =====================================================================
// SOCIAL FEED (Module 3)
// =====================================================================
const ReactionBar = ({ post, data, updateData, currentUser, t }) => {
  const postReactions = (data.reactions||[]).filter(r=>r.postId===post.id);
  const myReaction = postReactions.find(r=>r.userId===currentUser?.id);
  const counts = { like:0, love:0, prayer:0 };
  postReactions.forEach(r => { if (counts[r.type] !== undefined) counts[r.type]++; });

  const toggle = (type) => {
    if (myReaction?.type === type) {
      updateData('reactions', (data.reactions||[]).filter(r=>r.id!==myReaction.id));
    } else {
      const filtered = myReaction ? (data.reactions||[]).filter(r=>r.id!==myReaction.id) : (data.reactions||[]);
      updateData('reactions', [...filtered, { id:Date.now(), postId:post.id, userId:currentUser.id, type, createdAt:new Date().toISOString() }]);
      if (post.authorId !== currentUser.id) {
        addNotification(data, updateData, { userId:post.authorId, type:'post_reaction', title:t.social.feed, message:`${currentUser.firstName} ${t.social.reactedPost}`, refId:post.id });
      }
    }
  };

  const btnCls = (type) => `flex items-center gap-1 px-2 py-1 rounded-lg text-xs transition-colors ${myReaction?.type===type ? 'bg-gold-500/20 text-gold-400' : 'text-gray-500 hover:text-gray-300 hover:bg-dark-700'}`;

  return (
    <div className="flex items-center gap-1">
      <button onClick={()=>toggle('like')} className={btnCls('like')}><Icon name="heart" size={14}/>{counts.like>0&&counts.like}</button>
      <button onClick={()=>toggle('love')} className={btnCls('love')}><Icon name="star" size={14}/>{counts.love>0&&counts.love}</button>
      <button onClick={()=>toggle('prayer')} className={btnCls('prayer')}><Icon name="book" size={14}/>{counts.prayer>0&&counts.prayer}</button>
    </div>
  );
};

const CommentSection = ({ post, data, updateData, currentUser, t }) => {
  const [open, setOpen] = useState(false);
  const [text, setText] = useState('');
  const postComments = (data.comments||[]).filter(c=>c.postId===post.id).sort((a,b)=>new Date(a.createdAt)-new Date(b.createdAt));

  const addComment = () => {
    if (!text.trim()) return;
    updateData('comments', [...(data.comments||[]), { id:Date.now(), postId:post.id, userId:currentUser.id, text:text.trim(), createdAt:new Date().toISOString() }]);
    if (post.authorId !== currentUser.id) {
      addNotification(data, updateData, { userId:post.authorId, type:'post_comment', title:t.social.feed, message:`${currentUser.firstName} ${t.social.commentedPost}`, refId:post.id });
    }
    setText('');
  };

  return (
    <div>
      <button onClick={()=>setOpen(!open)} className="flex items-center gap-1 px-2 py-1 rounded-lg text-xs text-gray-500 hover:text-gray-300 hover:bg-dark-700">
        <Icon name="message" size={14}/>{postComments.length>0&&postComments.length} {t.social.comment}
      </button>
      {open && (
        <div className="mt-2 pl-4 border-l-2 border-dark-700 space-y-2">
          {postComments.map(c=>(
            <div key={c.id} className="flex gap-2">
              <div className="w-6 h-6 rounded-full bg-gradient-to-br from-gold-500 to-gold-700 flex items-center justify-center text-dark-900 text-[9px] font-bold flex-shrink-0">{getUserInitials(c.userId, data)}</div>
              <div>
                <span className="text-xs font-semibold text-gold-400">{getUserName(c.userId, data)}</span>
                <span className="text-xs text-gray-400 ml-2">{c.text}</span>
                <span className="text-[9px] text-gray-600 ml-2">{timeAgo(c.createdAt)}</span>
              </div>
            </div>
          ))}
          <div className="flex gap-2">
            <input value={text} onChange={e=>setText(e.target.value)} onKeyDown={e=>e.key==='Enter'&&addComment()} placeholder={t.social.addComment} className="flex-1 text-xs px-2 py-1.5 rounded-lg border border-dark-600"/>
            <button onClick={addComment} className="text-gold-400 hover:text-gold-500"><Icon name="send" size={14}/></button>
          </div>
        </div>
      )}
    </div>
  );
};

const PostCard = ({ post, data, updateData, currentUser, t, onProfileClick }) => {
  const author = (data.users||[]).find(u=>u.id===post.authorId);
  const isRepost = post.repostOfId;
  const originalPost = isRepost ? (data.posts||[]).find(p=>p.id===post.repostOfId) : null;
  const displayPost = originalPost || post;
  const displayAuthor = (data.users||[]).find(u=>u.id===displayPost.authorId);

  const handleRepost = () => {
    if ((data.posts||[]).find(p=>p.repostOfId===displayPost.id && p.authorId===currentUser.id)) return;
    updateData('posts', [...(data.posts||[]), { id:Date.now(), authorId:currentUser.id, text:'', repostOfId:displayPost.id, visibility:'public', createdAt:new Date().toISOString() }]);
  };

  const handleDelete = () => {
    updateData('posts', (data.posts||[]).filter(p=>p.id!==post.id));
    updateData('reactions', (data.reactions||[]).filter(r=>r.postId!==post.id));
    updateData('comments', (data.comments||[]).filter(c=>c.postId!==post.id));
  };

  return (
    <div className="card p-4">
      {isRepost && <div className="text-[10px] text-gray-500 mb-2 flex items-center gap-1"><Icon name="share" size={11}/>{t.social.repostedBy} {getUserName(post.authorId, data)}</div>}
      <div className="flex gap-3">
        <div className="w-10 h-10 rounded-full bg-gradient-to-br from-gold-500 to-gold-700 flex items-center justify-center text-dark-900 text-sm font-bold flex-shrink-0 cursor-pointer" onClick={()=>onProfileClick?.(displayPost.authorId)}>
          {displayAuthor?.firstName?.[0]}{displayAuthor?.lastName?.[0]}
        </div>
        <div className="flex-1 min-w-0">
          <div className="flex items-center gap-2">
            <span className="font-semibold text-sm text-white cursor-pointer hover:text-gold-400" onClick={()=>onProfileClick?.(displayPost.authorId)}>{displayAuthor?.firstName} {displayAuthor?.lastName}</span>
            <span className={`badge text-[9px] ${getRoleBadgeClass(displayAuthor?.role)}`}>{getRoleLabel(displayAuthor?.role, t)}</span>
            <span className="text-[10px] text-gray-600">{timeAgo(displayPost.createdAt)}</span>
          </div>
          {displayPost.text && <p className="text-sm text-gray-300 mt-1 whitespace-pre-wrap">{displayPost.text}</p>}
          {displayPost.mediaUrl && (
            <div className="mt-2 rounded-xl overflow-hidden border border-dark-700">
              {/\.(mp4|webm)/i.test(displayPost.mediaUrl) ? <video src={displayPost.mediaUrl} controls className="w-full max-h-80 object-cover"/>
              : <img src={displayPost.mediaUrl} alt="" className="w-full max-h-80 object-cover" onError={e=>{e.target.style.display='none'}}/>}
            </div>
          )}
          <div className="flex items-center gap-2 mt-2">
            <ReactionBar post={displayPost} data={data} updateData={updateData} currentUser={currentUser} t={t}/>
            <CommentSection post={displayPost} data={data} updateData={updateData} currentUser={currentUser} t={t}/>
            <button onClick={handleRepost} className="flex items-center gap-1 px-2 py-1 rounded-lg text-xs text-gray-500 hover:text-gray-300 hover:bg-dark-700"><Icon name="share" size={14}/></button>
            {(post.authorId===currentUser?.id || canManage(currentUser)) && <button onClick={handleDelete} className="ml-auto text-gray-600 hover:text-red-400"><Icon name="trash" size={13}/></button>}
          </div>
        </div>
      </div>
    </div>
  );
};

const FeedPage = ({ data, updateData, t, currentUser }) => {
  const [text, setText] = useState('');
  const [mediaUrl, setMediaUrl] = useState('');
  const [visibility, setVisibility] = useState('public');
  const [profileUser, setProfileUser] = useState(null);

  const handlePost = () => {
    if (!text.trim() && !mediaUrl.trim()) return;
    updateData('posts', [...(data.posts||[]), { id:Date.now(), authorId:currentUser.id, text:text.trim(), mediaUrl:mediaUrl.trim()||null, visibility, createdAt:new Date().toISOString() }]);
    setText(''); setMediaUrl('');
  };

  const followingIds = (data.follows||[]).filter(f=>f.followerId===currentUser?.id && f.status==='accepted').map(f=>f.followingId);
  const feedPosts = (data.posts||[]).filter(p => {
    if (p.authorId === currentUser?.id) return true;
    if (followingIds.includes(p.authorId)) return true;
    if (p.visibility === 'public') return true;
    return false;
  }).sort((a,b)=>new Date(b.createdAt)-new Date(a.createdAt));

  // Pending follow requests for current user
  const pendingRequests = (data.follows||[]).filter(f=>f.followingId===currentUser?.id && f.status==='pending');

  const acceptRequest = (followId) => {
    updateData('follows', (data.follows||[]).map(f=>f.id===followId?{...f, status:'accepted'}:f));
  };
  const declineRequest = (followId) => {
    updateData('follows', (data.follows||[]).filter(f=>f.id!==followId));
  };

  return (
    <div className="space-y-4 fade-in max-w-2xl mx-auto">
      {/* Post Composer */}
      <div className="card p-4">
        <div className="flex gap-3">
          <div className="w-10 h-10 rounded-full bg-gradient-to-br from-gold-500 to-gold-700 flex items-center justify-center text-dark-900 text-sm font-bold flex-shrink-0">{currentUser?.firstName?.[0]}{currentUser?.lastName?.[0]}</div>
          <div className="flex-1">
            <textarea value={text} onChange={e=>setText(e.target.value.slice(0,280))} placeholder={t.social.whatsOnMind} rows={2} className="w-full text-sm rounded-lg border border-dark-600 px-3 py-2 resize-none"/>
            <div className="flex items-center justify-between mt-2">
              <div className="flex items-center gap-2">
                <input value={mediaUrl} onChange={e=>setMediaUrl(e.target.value)} placeholder="Media URL (optional)" className="text-xs px-2 py-1 rounded border border-dark-600 w-40"/>
                <span className="text-[10px] text-gray-600">{280-text.length} {t.social.charLeft}</span>
              </div>
              <Btn variant="gold" size="sm" onClick={handlePost} disabled={!text.trim()&&!mediaUrl.trim()}><Icon name="send" size={14}/>{t.social.post}</Btn>
            </div>
          </div>
        </div>
      </div>

      {/* Pending Follow Requests */}
      {pendingRequests.length > 0 && (
        <div className="card p-4">
          <h4 className="text-sm font-bold text-gold-400 mb-2">{t.social.pendingRequests} ({pendingRequests.length})</h4>
          {pendingRequests.map(f => (
            <div key={f.id} className="flex items-center gap-3 py-2">
              <div className="w-8 h-8 rounded-full bg-gradient-to-br from-gold-500 to-gold-700 flex items-center justify-center text-dark-900 text-xs font-bold">{getUserInitials(f.followerId, data)}</div>
              <span className="text-sm text-gray-300 flex-1">{getUserName(f.followerId, data)}</span>
              <button onClick={()=>acceptRequest(f.id)} className="badge badge-green cursor-pointer text-[10px]">{t.social.accept}</button>
              <button onClick={()=>declineRequest(f.id)} className="badge badge-red cursor-pointer text-[10px]">{t.social.decline}</button>
            </div>
          ))}
        </div>
      )}

      {/* Discover Users */}
      {feedPosts.length === 0 && (
        <div className="card p-4">
          <EmptyState icon="list" message={t.social.noPostsYet}/>
          <div className="mt-4 grid grid-cols-2 gap-2">
            {(data.users||[]).filter(u=>u.id!==currentUser?.id && u.status==='approved').slice(0,4).map(u=>(
              <div key={u.id} className="flex items-center gap-2 p-2 rounded-lg bg-dark-900">
                <div className="w-7 h-7 rounded-full bg-gradient-to-br from-gold-500 to-gold-700 flex items-center justify-center text-dark-900 text-[9px] font-bold">{u.firstName?.[0]}{u.lastName?.[0]}</div>
                <span className="text-xs text-gray-300 flex-1 truncate">{u.firstName} {u.lastName}</span>
                <FollowButton targetUserId={u.id} data={data} updateData={updateData} currentUser={currentUser} t={t}/>
              </div>
            ))}
          </div>
        </div>
      )}

      {/* Feed */}
      {feedPosts.map(p => <PostCard key={p.id} post={p} data={data} updateData={updateData} currentUser={currentUser} t={t} onProfileClick={setProfileUser}/>)}

      <UserProfileModal userId={profileUser} isOpen={!!profileUser} onClose={()=>setProfileUser(null)} data={data} updateData={updateData} currentUser={currentUser} t={t}/>
    </div>
  );
};

const SpaceDetailModal = ({ space, isOpen, onClose, data, updateData, currentUser, t }) => {
  const [chatText, setChatText] = useState('');
  if (!isOpen || !space) return null;

  const participants = (data.spaceParticipants||[]).filter(p=>p.spaceId===space.id && !p.leftAt);
  const chats = (data.spaceChats||[]).filter(c=>c.spaceId===space.id).sort((a,b)=>new Date(a.createdAt)-new Date(b.createdAt));
  const isHost = space.hostId === currentUser?.id;
  const isJoined = participants.some(p=>p.userId===currentUser?.id);
  const isLive = space.status === 'live';

  const joinSpace = () => {
    if (isJoined) return;
    updateData('spaceParticipants', [...(data.spaceParticipants||[]), { id:Date.now(), spaceId:space.id, userId:currentUser.id, joinedAt:new Date().toISOString(), leftAt:null }]);
  };

  const leaveSpace = () => {
    updateData('spaceParticipants', (data.spaceParticipants||[]).map(p => p.spaceId===space.id && p.userId===currentUser.id && !p.leftAt ? {...p, leftAt:new Date().toISOString()} : p));
  };

  const sendChat = () => {
    if (!chatText.trim()) return;
    updateData('spaceChats', [...(data.spaceChats||[]), { id:Date.now(), spaceId:space.id, userId:currentUser.id, text:chatText.trim(), createdAt:new Date().toISOString() }]);
    setChatText('');
  };

  const endSpace = () => {
    updateData('spaces', (data.spaces||[]).map(s=>s.id===space.id?{...s, status:'ended', endedAt:new Date().toISOString()}:s));
    updateData('spaceParticipants', (data.spaceParticipants||[]).map(p=>p.spaceId===space.id && !p.leftAt?{...p,leftAt:new Date().toISOString()}:p));
    onClose();
  };

  const goLive = () => {
    updateData('spaces', (data.spaces||[]).map(s=>s.id===space.id?{...s, status:'live', startedAt:new Date().toISOString()}:s));
    joinSpace();
    // Notify followers
    const followerIds = (data.follows||[]).filter(f=>f.followingId===currentUser?.id && f.status==='accepted').map(f=>f.followerId);
    followerIds.forEach(fid => {
      addNotification(data, updateData, { userId:fid, type:'space_live', title:t.social.spaces, message:`${currentUser.firstName} ${t.social.wentLive}: ${space.title}`, refId:space.id });
    });
  };

  return (
    <div className="modal-backdrop" onClick={onClose}>
      <div className="modal p-0 fade-in" style={{maxWidth:'600px'}} onClick={e=>e.stopPropagation()}>
        {/* Header */}
        <div className="p-4 border-b border-dark-700">
          <div className="flex items-center justify-between">
            <div>
              <div className="flex items-center gap-2">
                <h3 className="font-bold text-white">{space.title}</h3>
                {isLive && <span className="badge badge-red text-[10px] animate-pulse">{t.social.liveNow}</span>}
              </div>
              <div className="text-xs text-gray-500 mt-1">{t.social.host}: {getUserName(space.hostId, data)} | {participants.length} {t.social.participants}</div>
            </div>
            <button onClick={onClose} className="text-gray-500 hover:text-white"><Icon name="close" size={20}/></button>
          </div>
        </div>

        {/* Simulated Stream Area */}
        <div className="bg-dark-900 p-6 flex flex-col items-center justify-center" style={{minHeight:'120px'}}>
          <Icon name={space.type==='video'?'video':'mic'} size={40} className="text-gold-500/30 mb-2"/>
          <div className="text-sm text-gray-500">{isLive ? (space.type==='video'?'Video':'Audio')+' Stream (Simulated)' : space.status==='upcoming' ? `${t.social.scheduledFor} ${space.scheduledAt}` : t.social.ended}</div>
        </div>

        {/* Actions */}
        <div className="flex gap-2 p-3 border-b border-dark-700">
          {isLive && !isJoined && <Btn variant="gold" size="sm" onClick={joinSpace}><Icon name="plus" size={14}/>{t.social.joinSpace}</Btn>}
          {isLive && isJoined && !isHost && <Btn variant="ghost" size="sm" onClick={leaveSpace}>{t.social.leaveSpace}</Btn>}
          {isHost && space.status==='upcoming' && <Btn variant="gold" size="sm" onClick={goLive}><Icon name="play" size={14}/>{t.social.startSpace}</Btn>}
          {isHost && isLive && <Btn variant="danger" size="sm" onClick={endSpace}>{t.social.endSpace}</Btn>}
        </div>

        {/* Participants */}
        <div className="p-3 border-b border-dark-700">
          <div className="text-xs text-gray-500 mb-2">{t.social.participants} ({participants.length})</div>
          <div className="flex flex-wrap gap-1">
            {participants.map(p=>(
              <span key={p.id} className="badge badge-blue text-[10px]">{getUserName(p.userId, data)}</span>
            ))}
          </div>
        </div>

        {/* Chat */}
        {isLive && (
          <div className="p-3">
            <div className="text-xs text-gray-500 mb-2">{t.social.chat}</div>
            <div className="max-h-40 overflow-y-auto space-y-1 mb-2">
              {chats.slice(-30).map(c=>(
                <div key={c.id} className="text-xs"><span className="font-semibold text-gold-400">{getUserName(c.userId, data)}</span> <span className="text-gray-400">{c.text}</span></div>
              ))}
            </div>
            {isJoined && (
              <div className="flex gap-2">
                <input value={chatText} onChange={e=>setChatText(e.target.value)} onKeyDown={e=>e.key==='Enter'&&sendChat()} placeholder={t.social.sendMessage} className="flex-1 text-xs px-2 py-1.5 rounded-lg border border-dark-600"/>
                <button onClick={sendChat} className="text-gold-400 hover:text-gold-500"><Icon name="send" size={14}/></button>
              </div>
            )}
          </div>
        )}
      </div>
    </div>
  );
};

const SpacesPage = ({ data, updateData, t, currentUser }) => {
  const [tab, setTab] = useState('live');
  const [createModal, setCreateModal] = useState(false);
  const [selectedSpace, setSelectedSpace] = useState(null);
  const [form, setForm] = useState({});

  const isAdminOrLeader = ['superadmin','admin','ministry_leader'].includes(currentUser?.role);
  const spaces = (data.spaces||[]);
  const liveSpaces = spaces.filter(s=>s.status==='live');
  const upcomingSpaces = spaces.filter(s=>s.status==='upcoming').sort((a,b)=>new Date(a.scheduledAt)-new Date(b.scheduledAt));
  const endedSpaces = spaces.filter(s=>s.status==='ended').sort((a,b)=>new Date(b.endedAt)-new Date(a.endedAt));

  const openCreate = () => {
    setForm({ title:'', description:'', type:'audio', scheduledAt:'' });
    setCreateModal(true);
  };

  const handleCreate = () => {
    if (!form.title?.trim()) return;
    const status = form.scheduledAt ? 'upcoming' : 'live';
    const newSpace = { id:Date.now(), hostId:currentUser.id, title:form.title.trim(), description:form.description, type:form.type, status, scheduledAt:form.scheduledAt||null, startedAt:status==='live'?new Date().toISOString():null, endedAt:null, createdAt:new Date().toISOString() };
    updateData('spaces', [...spaces, newSpace]);
    if (status === 'live') {
      updateData('spaceParticipants', [...(data.spaceParticipants||[]), { id:Date.now()+1, spaceId:newSpace.id, userId:currentUser.id, joinedAt:new Date().toISOString(), leftAt:null }]);
    }
    setCreateModal(false);
    if (status === 'live') setSelectedSpace(newSpace.id);
  };

  const tabs = [
    { id:'live', label:t.social.liveNow, count:liveSpaces.length, color:'text-red-400' },
    { id:'upcoming', label:t.social.upcoming, count:upcomingSpaces.length, color:'text-blue-400' },
    { id:'ended', label:t.social.ended, count:endedSpaces.length, color:'text-gray-400' },
  ];

  const displaySpaces = tab==='live'?liveSpaces:tab==='upcoming'?upcomingSpaces:endedSpaces;

  const SpaceCard = ({ space }) => {
    const pCount = (data.spaceParticipants||[]).filter(p=>p.spaceId===space.id && !p.leftAt).length;
    return (
      <div onClick={()=>setSelectedSpace(space.id)} className="card p-4 cursor-pointer hover:border-gold-500/30 border border-transparent transition-colors">
        <div className="flex items-start gap-3">
          <div className={`w-12 h-12 rounded-xl flex items-center justify-center ${space.status==='live'?'bg-red-900/30 text-red-400':'bg-gold-500/10 text-gold-400'}`}>
            <Icon name={space.type==='video'?'video':'mic'} size={22}/>
          </div>
          <div className="flex-1 min-w-0">
            <div className="flex items-center gap-2">
              <h4 className="font-semibold text-white text-sm truncate">{space.title}</h4>
              {space.status==='live' && <span className="badge badge-red text-[9px] animate-pulse">LIVE</span>}
            </div>
            <div className="text-xs text-gray-500 mt-0.5">{t.social.host}: {getUserName(space.hostId, data)}</div>
            <div className="flex items-center gap-3 mt-1 text-[10px] text-gray-600">
              <span><Icon name="users" size={11} className="inline mr-1"/>{pCount} {t.social.participants}</span>
              <span className="badge badge-blue text-[9px]">{space.type==='video'?t.social.videoSpace:t.social.audio}</span>
              {space.scheduledAt && <span><Icon name="clock" size={11} className="inline mr-1"/>{space.scheduledAt}</span>}
            </div>
          </div>
        </div>
      </div>
    );
  };

  const activeSpace = spaces.find(s=>s.id===selectedSpace);

  return (
    <div className="space-y-4 fade-in">
      <div className="card p-4 flex justify-between items-center">
        <div className="flex gap-1">
          {tabs.map(tb=>(
            <button key={tb.id} onClick={()=>setTab(tb.id)} className={`px-3 py-1.5 rounded-lg text-sm font-medium transition-colors ${tab===tb.id?'bg-dark-700 text-white':'text-gray-500 hover:text-gray-300'}`}>
              {tb.label} {tb.count>0 && <span className={`ml-1 text-xs ${tb.color}`}>{tb.count}</span>}
            </button>
          ))}
        </div>
        {isAdminOrLeader && <Btn variant="primary" onClick={openCreate}><Icon name="plus" size={16}/>{t.social.createSpace}</Btn>}
      </div>

      {displaySpaces.length===0
        ? <div className="card"><EmptyState icon="video" message={t.social.noSpaces}/></div>
        : <div className="grid grid-cols-1 md:grid-cols-2 gap-4">{displaySpaces.map(s=><SpaceCard key={s.id} space={s}/>)}</div>
      }

      <Modal isOpen={createModal} onClose={()=>setCreateModal(false)} title={t.social.createSpace} maxWidth="max-w-md">
        <div className="space-y-3">
          <Input label={t.social.spaceTitle} value={form.title||''} onChange={v=>setForm(f=>({...f,title:v}))} required/>
          <Textarea label={t.social.spaceDesc} value={form.description||''} onChange={v=>setForm(f=>({...f,description:v}))}/>
          <Select label={t.social.spaceType} value={form.type||'audio'} onChange={v=>setForm(f=>({...f,type:v}))} options={[{value:'audio',label:t.social.audio},{value:'video',label:t.social.videoSpace}]}/>
          <Input label={`${t.social.scheduleSpace} (${t.common.date})`} type="datetime-local" value={form.scheduledAt||''} onChange={v=>setForm(f=>({...f,scheduledAt:v}))}/>
          <p className="text-[10px] text-gray-600">Leave date empty to go live immediately</p>
        </div>
        <div className="flex justify-end gap-3 mt-5">
          <Btn variant="ghost" onClick={()=>setCreateModal(false)}>{t.common.cancel}</Btn>
          <Btn variant="gold" onClick={handleCreate}><Icon name="play" size={15}/>{form.scheduledAt?t.social.scheduleSpace:t.social.startSpace}</Btn>
        </div>
      </Modal>

      <SpaceDetailModal space={activeSpace} isOpen={!!activeSpace} onClose={()=>setSelectedSpace(null)} data={data} updateData={updateData} currentUser={currentUser} t={t}/>
    </div>
  );
};

const RankingPage = ({ data, updateData, t, currentUser }) => {
  const [period, setPeriod] = useState('allTime');
  const [groupFilter, setGroupFilter] = useState('all');

  const now = new Date();
  const weekStart = new Date(now); weekStart.setDate(now.getDate()-now.getDay());
  const monthStart = new Date(now.getFullYear(), now.getMonth(), 1);

  const userStars = {};
  (data.stars||[]).forEach(s => {
    const d = new Date(s.createdAt);
    const inPeriod = period==='allTime' || (period==='thisWeek' && d>=weekStart) || (period==='thisMonth' && d>=monthStart);
    if (inPeriod) {
      userStars[s.toUserId] = (userStars[s.toUserId]||0) + s.count;
    }
  });

  const rankedUsers = Object.entries(userStars)
    .map(([uid, stars]) => ({ userId:Number(uid), stars, user:(data.users||[]).find(u=>u.id===Number(uid)) }))
    .filter(r => r.user)
    .sort((a,b) => b.stars - a.stars);

  const allUsers = (data.users||[]).filter(u=>u.status==='approved');
  const fullRanking = allUsers.map(u => {
    const stars = userStars[u.id] || 0;
    const badges = (data.badges||[]).filter(b=>b.userId===u.id).length;
    const spacesAttended = (data.spaceParticipants||[]).filter(p=>p.userId===u.id).length;
    return { user:u, stars, badges, spacesAttended };
  }).sort((a,b) => b.stars - a.stars);

  const periods = [
    { id:'thisWeek', label:t.social.thisWeek },
    { id:'thisMonth', label:t.social.thisMonth },
    { id:'allTime', label:t.social.allTime },
  ];

  return (
    <div className="space-y-4 fade-in">
      <div className="card p-4 flex items-center justify-between">
        <div className="flex gap-1">
          {periods.map(p=>(
            <button key={p.id} onClick={()=>setPeriod(p.id)} className={`px-3 py-1.5 rounded-lg text-sm font-medium transition-colors ${period===p.id?'bg-dark-700 text-white':'text-gray-500 hover:text-gray-300'}`}>{p.label}</button>
          ))}
        </div>
      </div>

      {/* Top 3 Podium */}
      {fullRanking.length > 0 && (
        <div className="grid grid-cols-3 gap-3">
          {fullRanking.slice(0,3).map((r,i) => (
            <div key={r.user.id} className={`card p-4 text-center ${i===0?'border border-gold-500/30':''}`}>
              <div className={`text-2xl mb-1 ${i===0?'text-gold-400':i===1?'text-gray-400':'text-amber-700'}`}>{i===0?'🥇':i===1?'🥈':'🥉'}</div>
              <div className="w-12 h-12 mx-auto rounded-full bg-gradient-to-br from-gold-500 to-gold-700 flex items-center justify-center text-dark-900 font-bold mb-2">{r.user.firstName?.[0]}{r.user.lastName?.[0]}</div>
              <div className="text-sm font-semibold text-white truncate">{r.user.firstName} {r.user.lastName}</div>
              <div className="flex items-center justify-center gap-1 mt-1"><Icon name="star" size={14} className="text-gold-400"/><span className="text-gold-400 font-bold">{r.stars}</span></div>
            </div>
          ))}
        </div>
      )}

      {/* Full Ranking Table */}
      <div className="card overflow-hidden">
        <table className="w-full text-sm">
          <thead><tr className="bg-dark-900 text-gray-500 text-xs">
            <th className="px-4 py-3 text-left">#</th>
            <th className="px-4 py-3 text-left">{t.common.name}</th>
            <th className="px-4 py-3 text-center"><Icon name="star" size={13} className="inline text-gold-400"/></th>
            <th className="px-4 py-3 text-center">{t.social.badges}</th>
            <th className="px-4 py-3 text-center">{t.social.spaces}</th>
          </tr></thead>
          <tbody>
            {fullRanking.map((r,i) => (
              <tr key={r.user.id} className="table-row border-t border-dark-700">
                <td className="px-4 py-3 font-bold text-gray-400">{i+1}</td>
                <td className="px-4 py-3">
                  <div className="flex items-center gap-2">
                    <div className="w-7 h-7 rounded-full bg-gradient-to-br from-gold-500 to-gold-700 flex items-center justify-center text-dark-900 text-[10px] font-bold">{r.user.firstName?.[0]}{r.user.lastName?.[0]}</div>
                    <div>
                      <div className="text-white font-medium">{r.user.firstName} {r.user.lastName}</div>
                      <div className="text-[10px] text-gray-600">{getRoleLabel(r.user.role, t)}</div>
                    </div>
                  </div>
                </td>
                <td className="px-4 py-3 text-center text-gold-400 font-bold">{r.stars}</td>
                <td className="px-4 py-3 text-center text-gray-400">{r.badges}</td>
                <td className="px-4 py-3 text-center text-gray-400">{r.spacesAttended}</td>
              </tr>
            ))}
            {fullRanking.length===0 && <tr><td colSpan={5} className="px-4 py-8 text-center text-gray-600">{t.common.noData}</td></tr>}
          </tbody>
        </table>
      </div>
    </div>
  );
};

// Active Rankings Panel
const RankingsPanel = ({ data, currentUser, setPage }) => {
  const [period, setPeriod] = useState('month');
  const users = data.users || [];
  const stars = data.stars || [];

  const now = Date.now();
  const filtered = period === 'all' ? stars :
    stars.filter(s => {
      const age = now - new Date(s.createdAt).getTime();
      return period === 'week' ? age < 7*24*3600000 : age < 30*24*3600000;
    });

  const ranking = users.map(u => ({
    ...u,
    totalStars: filtered.filter(s => s.toUserId === u.id).reduce((sum, s) => sum + (s.count || 1), 0)
  })).sort((a, b) => b.totalStars - a.totalStars).slice(0, 5);

  const maxStars = ranking[0]?.totalStars || 1;
  const myRank = users.map(u => ({
    id: u.id,
    totalStars: filtered.filter(s => s.toUserId === u.id).reduce((sum, s) => sum + (s.count || 1), 0)
  })).sort((a, b) => b.totalStars - a.totalStars).findIndex(u => u.id === currentUser?.id) + 1;

  return (
    <HubPanel title="Most Active Members" emoji="⭐" badge={period === 'week' ? 'This Week' : period === 'month' ? 'This Month' : 'All Time'} badgeColor="bg-gold-500/20 text-gold-400" onViewAll={() => setPage('ranking')}>
      <div className="flex gap-1 mb-3">
        {['week','month','all'].map(p => (
          <button key={p} onClick={() => setPeriod(p)} className={`text-[10px] px-2 py-1 rounded-full transition-colors ${period === p ? 'bg-gold-500/20 text-gold-400' : 'text-gray-500 hover:text-gray-300'}`}>
            {p === 'week' ? 'Week' : p === 'month' ? 'Month' : 'All'}
          </button>
        ))}
      </div>
      <div className="space-y-2">
        {ranking.map((u, i) => (
          <div key={u.id} className={`flex items-center gap-2 p-1.5 rounded-lg ${u.id === currentUser?.id ? 'bg-gold-500/10 border border-gold-500/20' : ''}`}>
            <span className="text-sm w-5 text-center">{i === 0 ? '🥇' : i === 1 ? '🥈' : i === 2 ? '🥉' : <span className="text-gray-600 text-xs">{i+1}</span>}</span>
            <div className="w-7 h-7 rounded-full bg-gradient-to-br from-gold-500 to-gold-700 flex items-center justify-center text-dark-900 text-[10px] font-bold flex-shrink-0">
              {u.firstName?.[0]}{u.lastName?.[0]}
            </div>
            <div className="flex-1 min-w-0">
              <div className="text-white text-xs font-medium truncate">{u.firstName} {u.lastName}</div>
              <div className="h-1 bg-dark-700 rounded-full mt-0.5">
                <div className="h-full bg-gold-500 rounded-full transition-all" style={{width: `${Math.max(5, (u.totalStars / maxStars) * 100)}%`}}/>
              </div>
            </div>
            <span className="text-gold-400 text-xs font-semibold">★ {u.totalStars}</span>
          </div>
        ))}
      </div>
      {myRank > 5 && (
        <div className="mt-2 pt-2 border-t border-dark-700 text-xs text-gray-400">
          You: #{myRank} · ★ {filtered.filter(s => s.toUserId === currentUser?.id).reduce((sum, s) => sum + (s.count || 1), 0)} this {period === 'all' ? 'total' : period}
        </div>
      )}
    </HubPanel>
  );
};

// Prayer Wall Panel
const PrayerWallPanel = ({ data, updateData, currentUser, setPage }) => {
  const requests = (data.prayerRequests || []).filter(r => !r.deletedAt && !r.isAnswered).slice(-3).reverse();

  const togglePraying = (reqId) => {
    const interactions = data.prayerInteractions || [];
    const existing = interactions.find(i => i.prayerRequestId === reqId && i.userId === currentUser.id && i.type === 'praying');
    if (existing) {
      updateData('prayerInteractions', interactions.filter(i => i.id !== existing.id));
    } else {
      updateData('prayerInteractions', [...interactions, { id: Date.now().toString(), prayerRequestId: reqId, userId: currentUser.id, type: 'praying', createdAt: new Date().toISOString() }]);
    }
  };

  return (
    <HubPanel title="Prayer Wall" emoji="🙏" badge={requests.length || null} onViewAll={() => setPage('prayer_wall')}>
      {requests.length === 0 ? (
        <p className="text-gray-500 text-sm text-center py-4">No prayer requests yet</p>
      ) : (
        <div className="space-y-3">
          {requests.map(req => {
            const user = (data.users || []).find(u => u.id === req.userId);
            const prayingCount = (data.prayerInteractions || []).filter(i => i.prayerRequestId === req.id && i.type === 'praying').length;
            const isPraying = (data.prayerInteractions || []).some(i => i.prayerRequestId === req.id && i.userId === currentUser.id && i.type === 'praying');
            const displayName = req.visibility === 'anonymous' && req.userId !== currentUser.id ? 'Anonymous' : `${user?.firstName || ''} ${user?.lastName || ''}`;

            return (
              <div key={req.id} className={`p-2.5 rounded-lg ${req.isAnswered ? 'bg-green-900/10 border border-green-800/20' : 'bg-dark-700/50'}`}>
                <div className="flex items-center gap-2 mb-1">
                  <span className="text-xs text-gray-400">{displayName}</span>
                  <span className="text-[10px] text-gray-600">{timeAgo(req.createdAt)}</span>
                </div>
                <p className="text-gray-300 text-xs line-clamp-2">{req.content}</p>
                <div className="flex gap-2 mt-2">
                  <button onClick={() => togglePraying(req.id)} className={`text-[10px] px-2 py-1 rounded-full transition-colors ${isPraying ? 'bg-blue-500/20 text-blue-400' : 'bg-dark-600 text-gray-400 hover:text-blue-400'}`}>
                    🙏 {prayingCount > 0 ? prayingCount : ''} Praying
                  </button>
                </div>
              </div>
            );
          })}
        </div>
      )}
    </HubPanel>
  );
};

// Fundraising Panel
const FundraisingPanel = ({ data, setPage }) => {
  const campaigns = (data.fundraisingCampaigns || []).filter(c => c.isActive).slice(0, 2);

  return (
    <HubPanel title="Fundraising" emoji="💝" badge={campaigns.length || null} onViewAll={() => setPage('fundraising_page')}>
      {campaigns.length === 0 ? (
        <p className="text-gray-500 text-sm text-center py-4">No active campaigns</p>
      ) : (
        <div className="space-y-3">
          {campaigns.map(c => {
            const donations = (data.fundraisingDonations || []).filter(d => d.campaignId === c.id);
            const raised = donations.reduce((s, d) => s + d.amount, 0);
            const pct = c.goalAmount > 0 ? Math.min(100, Math.round((raised / c.goalAmount) * 100)) : 0;
            const daysLeft = Math.max(0, Math.ceil((new Date(c.endDate) - Date.now()) / (24*3600000)));
            const isUrgent = daysLeft < 7 && pct < 50;
            const barColor = pct >= 75 ? 'bg-green-500' : pct >= 40 ? 'bg-yellow-500' : 'bg-red-500';

            return (
              <div key={c.id} className="p-2.5 rounded-lg bg-dark-700/50">
                {isUrgent && <div className="text-[10px] text-red-400 font-bold mb-1">⚠ URGENT — {daysLeft} days left</div>}
                <div className="text-white text-sm font-medium">{c.title}</div>
                <div className="flex items-center justify-between text-[10px] text-gray-500 mt-1">
                  <span>{daysLeft} days left</span>
                  <span>{donations.length} donors</span>
                </div>
                <div className="h-2 bg-dark-600 rounded-full mt-2">
                  <div className={`h-full ${barColor} rounded-full transition-all duration-700`} style={{width: `${pct}%`}}/>
                </div>
                <div className="flex justify-between text-[10px] mt-1">
                  <span className="text-white font-semibold">${raised.toLocaleString()}</span>
                  <span className="text-gray-500">of ${c.goalAmount.toLocaleString()}</span>
                </div>
              </div>
            );
          })}
        </div>
      )}
    </HubPanel>
  );
};

// Birthdays Panel
const BirthdaysPanel = ({ data }) => {
  const today = new Date();
  const members = (data.members || []).filter(m => m.birthDate && m.status === 'active');
  const upcoming = members.map(m => {
    const [y, mo, d] = m.birthDate.split('-').map(Number);
    const bday = new Date(today.getFullYear(), mo - 1, d);
    if (bday < today) bday.setFullYear(bday.getFullYear() + 1);
    const daysUntil = Math.ceil((bday - today) / (24*3600000));
    return { ...m, daysUntil, isToday: daysUntil === 0 };
  }).filter(m => m.daysUntil >= 0 && m.daysUntil <= 30).sort((a, b) => a.daysUntil - b.daysUntil).slice(0, 5);

  return (
    <HubPanel title="Upcoming Birthdays" emoji="🎂">
      {upcoming.length === 0 ? (
        <p className="text-gray-500 text-sm text-center py-4">No birthdays coming up</p>
      ) : (
        <div className="space-y-2">
          {upcoming.map(m => (
            <div key={m.id} className={`flex items-center gap-3 p-2 rounded-lg ${m.isToday ? 'bg-gold-500/10 border border-gold-500/20' : 'hover:bg-dark-700/50'} transition-colors`}>
              <div className="w-8 h-8 rounded-full bg-gradient-to-br from-gold-500 to-gold-700 flex items-center justify-center text-dark-900 text-[10px] font-bold flex-shrink-0">
                {m.firstName?.[0]}{m.lastName?.[0]}
              </div>
              <div className="flex-1 min-w-0">
                <div className="text-white text-xs font-medium truncate">{m.firstName} {m.lastName}</div>
                <div className="text-[10px] text-gray-500">{m.birthDate?.split('-').slice(1).join('/')}</div>
              </div>
              <span className={`text-[10px] font-semibold ${m.isToday ? 'text-gold-400' : 'text-gray-500'}`}>
                {m.isToday ? '🎉 Today!' : `in ${m.daysUntil}d`}
              </span>
            </div>
          ))}
        </div>
      )}
    </HubPanel>
  );
};

// Prayer Wall Full Page
const PrayerWallPage = ({ data, updateData, t, currentUser }) => {
  const [showForm, setShowForm] = useState(false);
  const [content, setContent] = useState('');
  const [category, setCategory] = useState('other');
  const [visibility, setVisibility] = useState('public');
  const isLeader = ['superadmin', 'admin', 'ministry_leader'].includes(currentUser?.role);
  const requests = (data.prayerRequests || []).filter(r => !r.deletedAt).filter(r => {
    if (r.visibility === 'leaders_only' && !isLeader) return false;
    return true;
  }).sort((a, b) => a.isAnswered - b.isAnswered || new Date(b.createdAt) - new Date(a.createdAt));

  const handleSubmit = () => {
    if (!content.trim()) return;
    const req = { id: Date.now().toString(), userId: currentUser.id, title: null, content, visibility, category, isAnswered: false, answeredAt: null, createdAt: new Date().toISOString(), deletedAt: null };
    updateData('prayerRequests', [...(data.prayerRequests || []), req]);
    setContent(''); setShowForm(false);
  };

  const toggleInteraction = (reqId, type) => {
    const interactions = data.prayerInteractions || [];
    const existing = interactions.find(i => i.prayerRequestId === reqId && i.userId === currentUser.id && i.type === type);
    if (existing) {
      updateData('prayerInteractions', interactions.filter(i => i.id !== existing.id));
    } else {
      updateData('prayerInteractions', [...interactions, { id: Date.now().toString() + type, prayerRequestId: reqId, userId: currentUser.id, type, createdAt: new Date().toISOString() }]);
    }
  };

  const markAnswered = (reqId) => {
    updateData('prayerRequests', (data.prayerRequests || []).map(r => r.id === reqId ? { ...r, isAnswered: true, answeredAt: new Date().toISOString() } : r));
  };

  return (
    <div>
      <div className="flex items-center justify-between mb-6">
        <h2 className="text-2xl font-bold text-white">🙏 {t.community.prayerWall}</h2>
        <button onClick={() => setShowForm(!showForm)} className="bg-gold-500 text-dark-900 px-4 py-2 rounded-lg text-sm font-semibold hover:bg-gold-400 transition-colors">{t.community.newPrayerRequest}</button>
      </div>
      {showForm && (
        <div className="bg-dark-800 border border-dark-700 rounded-xl p-4 mb-6">
          <textarea value={content} onChange={e => setContent(e.target.value.slice(0, 500))} placeholder={t.community.prayerContent} rows={3} className="w-full bg-dark-700 text-white px-3 py-2 rounded-lg text-sm mb-3 border border-dark-600 focus:border-gold-500 outline-none resize-none"/>
          <div className="text-[10px] text-gray-500 text-right mb-2">{content.length}/500</div>
          <div className="flex flex-wrap gap-3 mb-3">
            <div>
              <label className="text-[10px] text-gray-500 block mb-1">{t.community.category}</label>
              <select value={category} onChange={e => setCategory(e.target.value)} className="bg-dark-700 text-white text-sm px-2 py-1.5 rounded-lg border border-dark-600">
                {['health','family','work','finances','relationships','other'].map(c => <option key={c} value={c}>{t.community[c]}</option>)}
              </select>
            </div>
            <div>
              <label className="text-[10px] text-gray-500 block mb-1">{t.community.visibility}</label>
              <select value={visibility} onChange={e => setVisibility(e.target.value)} className="bg-dark-700 text-white text-sm px-2 py-1.5 rounded-lg border border-dark-600">
                <option value="public">{t.community.publicVis}</option>
                <option value="anonymous">{t.community.anonymous}</option>
                <option value="leaders_only">{t.community.leadersOnly}</option>
              </select>
            </div>
          </div>
          <div className="flex gap-2">
            <button onClick={handleSubmit} className="bg-gold-500 text-dark-900 px-4 py-2 rounded-lg text-sm font-semibold hover:bg-gold-400">{t.community.submit}</button>
            <button onClick={() => setShowForm(false)} className="text-gray-400 px-4 py-2 text-sm hover:text-white">{t.common.cancel}</button>
          </div>
        </div>
      )}
      <div className="space-y-3">
        {requests.map(req => {
          const user = (data.users || []).find(u => u.id === req.userId);
          const prayingCount = (data.prayerInteractions || []).filter(i => i.prayerRequestId === req.id && i.type === 'praying').length;
          const heartCount = (data.prayerInteractions || []).filter(i => i.prayerRequestId === req.id && i.type === 'heart').length;
          const isPraying = (data.prayerInteractions || []).some(i => i.prayerRequestId === req.id && i.userId === currentUser.id && i.type === 'praying');
          const hasHeart = (data.prayerInteractions || []).some(i => i.prayerRequestId === req.id && i.userId === currentUser.id && i.type === 'heart');
          const displayName = req.visibility === 'anonymous' && req.userId !== currentUser.id ? 'Anonymous' : `${user?.firstName || ''} ${user?.lastName || ''}`;
          const catColors = { health:'text-red-400', family:'text-purple-400', work:'text-blue-400', finances:'text-green-400', relationships:'text-pink-400', other:'text-gray-400' };

          return (
            <div key={req.id} className={`bg-dark-800 border rounded-xl p-4 ${req.isAnswered ? 'border-green-800/30 bg-green-900/5' : 'border-dark-700'}`}>
              <div className="flex items-center justify-between mb-2">
                <div className="flex items-center gap-2">
                  <span className="text-sm text-white font-medium">{displayName}</span>
                  <span className={`text-[10px] ${catColors[req.category] || 'text-gray-400'}`}>#{req.category}</span>
                  {req.isAnswered && <span className="text-[10px] bg-green-500/20 text-green-400 px-2 py-0.5 rounded-full">✓ {t.community.answeredPrayer}</span>}
                </div>
                <span className="text-[10px] text-gray-600">{timeAgo(req.createdAt)}</span>
              </div>
              <p className="text-gray-300 text-sm">{req.content}</p>
              <div className="flex items-center gap-3 mt-3">
                <button onClick={() => toggleInteraction(req.id, 'praying')} className={`text-xs px-3 py-1.5 rounded-full transition-colors ${isPraying ? 'bg-blue-500/20 text-blue-400' : 'bg-dark-700 text-gray-400 hover:text-blue-400'}`}>
                  🙏 {t.community.praying} {prayingCount > 0 ? prayingCount : ''}
                </button>
                <button onClick={() => toggleInteraction(req.id, 'heart')} className={`text-xs px-3 py-1.5 rounded-full transition-colors ${hasHeart ? 'bg-red-500/20 text-red-400' : 'bg-dark-700 text-gray-400 hover:text-red-400'}`}>
                  ❤ {heartCount > 0 ? heartCount : ''}
                </button>
                {req.userId === currentUser.id && !req.isAnswered && (
                  <button onClick={() => markAnswered(req.id)} className="text-xs text-green-400 hover:text-green-300 ml-auto">✓ {t.community.markAnswered}</button>
                )}
              </div>
            </div>
          );
        })}
        {requests.length === 0 && <p className="text-gray-500 text-center py-8">{t.community.noPrayers}</p>}
      </div>
    </div>
  );
};

// Fundraising Full Page
const FundraisingPage = ({ data, updateData, t, currentUser }) => {
  const [showForm, setShowForm] = useState(false);
  const [title, setTitle] = useState('');
  const [description, setDescription] = useState('');
  const [goalAmount, setGoalAmount] = useState('');
  const [endDate, setEndDate] = useState('');
  const [donateModal, setDonateModal] = useState(null);
  const [donateAmount, setDonateAmount] = useState('');
  const isAdmin = ['superadmin', 'admin'].includes(currentUser?.role);
  const campaigns = (data.fundraisingCampaigns || []).sort((a, b) => b.isActive - a.isActive || new Date(a.endDate) - new Date(b.endDate));

  const handleCreate = () => {
    if (!title.trim() || !goalAmount || !endDate) return;
    const c = { id: Date.now().toString(), title, description, goalAmount: Number(goalAmount), coverImageUrl: null, isActive: true, startDate: new Date().toISOString().split('T')[0], endDate, createdBy: currentUser.id, createdAt: new Date().toISOString() };
    updateData('fundraisingCampaigns', [...(data.fundraisingCampaigns || []), c]);
    setTitle(''); setDescription(''); setGoalAmount(''); setEndDate(''); setShowForm(false);
  };

  const handleDonate = () => {
    if (!donateAmount || Number(donateAmount) <= 0) return;
    const d = { id: Date.now().toString(), campaignId: donateModal, userId: currentUser.id, amount: Number(donateAmount), note: null, donatedAt: new Date().toISOString() };
    updateData('fundraisingDonations', [...(data.fundraisingDonations || []), d]);
    setDonateAmount(''); setDonateModal(null);
  };

  return (
    <div>
      <div className="flex items-center justify-between mb-6">
        <h2 className="text-2xl font-bold text-white">💝 {t.community.fundraising}</h2>
        {isAdmin && <button onClick={() => setShowForm(!showForm)} className="bg-gold-500 text-dark-900 px-4 py-2 rounded-lg text-sm font-semibold hover:bg-gold-400 transition-colors">{t.community.newCampaign}</button>}
      </div>
      {showForm && (
        <div className="bg-dark-800 border border-dark-700 rounded-xl p-4 mb-6">
          <input value={title} onChange={e => setTitle(e.target.value)} placeholder={t.community.campaignTitle} className="w-full bg-dark-700 text-white px-3 py-2 rounded-lg text-sm mb-3 border border-dark-600 focus:border-gold-500 outline-none"/>
          <textarea value={description} onChange={e => setDescription(e.target.value)} placeholder={t.community.campaignDesc} rows={2} className="w-full bg-dark-700 text-white px-3 py-2 rounded-lg text-sm mb-3 border border-dark-600 focus:border-gold-500 outline-none resize-none"/>
          <div className="grid grid-cols-2 gap-3 mb-3">
            <input value={goalAmount} onChange={e => setGoalAmount(e.target.value)} placeholder={t.community.goalAmount + " ($)"} type="number" className="bg-dark-700 text-white px-3 py-2 rounded-lg text-sm border border-dark-600 focus:border-gold-500 outline-none"/>
            <input value={endDate} onChange={e => setEndDate(e.target.value)} type="date" className="bg-dark-700 text-white px-3 py-2 rounded-lg text-sm border border-dark-600 focus:border-gold-500 outline-none"/>
          </div>
          <div className="flex gap-2">
            <button onClick={handleCreate} className="bg-gold-500 text-dark-900 px-4 py-2 rounded-lg text-sm font-semibold hover:bg-gold-400">{t.community.publish}</button>
            <button onClick={() => setShowForm(false)} className="text-gray-400 px-4 py-2 text-sm hover:text-white">{t.common.cancel}</button>
          </div>
        </div>
      )}
      <div className="space-y-4">
        {campaigns.map(c => {
          const donations = (data.fundraisingDonations || []).filter(d => d.campaignId === c.id);
          const raised = donations.reduce((s, d) => s + d.amount, 0);
          const pct = c.goalAmount > 0 ? Math.min(100, Math.round((raised / c.goalAmount) * 100)) : 0;
          const daysLeft = Math.max(0, Math.ceil((new Date(c.endDate) - Date.now()) / (24*3600000)));
          const isUrgent = daysLeft < 7 && pct < 50 && c.isActive;
          const barColor = pct >= 75 ? 'bg-green-500' : pct >= 40 ? 'bg-yellow-500' : 'bg-red-500';

          return (
            <div key={c.id} className={`bg-dark-800 border rounded-xl p-5 ${c.isActive ? 'border-dark-700' : 'border-dark-700/50 opacity-60'}`}>
              {isUrgent && <div className="text-xs text-red-400 font-bold mb-2">⚠ {t.community.urgent.toUpperCase()} — {daysLeft} {t.community.daysLeft}</div>}
              <div className="flex items-start justify-between">
                <div>
                  <h3 className="text-white font-bold text-lg">{c.title}</h3>
                  {c.description && <p className="text-gray-400 text-sm mt-1">{c.description}</p>}
                </div>
                {c.isActive && <button onClick={() => setDonateModal(c.id)} className="bg-green-600 text-white px-4 py-2 rounded-lg text-sm font-semibold hover:bg-green-500 transition-colors flex-shrink-0">{t.community.donate}</button>}
              </div>
              <div className="mt-4">
                <div className="flex justify-between text-sm mb-1">
                  <span className="text-white font-bold">${raised.toLocaleString()}</span>
                  <span className="text-gray-500">of ${c.goalAmount.toLocaleString()} ({pct}%)</span>
                </div>
                <div className="h-3 bg-dark-600 rounded-full">
                  <div className={`h-full ${barColor} rounded-full transition-all duration-700`} style={{width: `${pct}%`}}/>
                </div>
                <div className="flex justify-between text-[10px] text-gray-500 mt-2">
                  <span>{donations.length} {t.community.donors}</span>
                  <span>{c.isActive ? `${daysLeft} ${t.community.daysLeft}` : t.community.completed}</span>
                </div>
              </div>
            </div>
          );
        })}
        {campaigns.length === 0 && <p className="text-gray-500 text-center py-8">{t.community.noCampaigns}</p>}
      </div>
      {donateModal && (
        <div className="fixed inset-0 bg-black/50 flex items-center justify-center z-50" onClick={() => setDonateModal(null)}>
          <div className="bg-dark-800 border border-dark-700 rounded-xl p-6 w-full max-w-sm" onClick={e => e.stopPropagation()}>
            <h3 className="text-white font-bold text-lg mb-4">{t.community.donate}</h3>
            <input value={donateAmount} onChange={e => setDonateAmount(e.target.value)} placeholder={t.community.donateAmount + " ($)"} type="number" min="1" className="w-full bg-dark-700 text-white px-3 py-2 rounded-lg text-sm mb-4 border border-dark-600 focus:border-gold-500 outline-none"/>
            <div className="flex gap-2">
              <button onClick={handleDonate} className="flex-1 bg-green-600 text-white py-2 rounded-lg text-sm font-semibold hover:bg-green-500">{t.community.donate}</button>
              <button onClick={() => setDonateModal(null)} className="flex-1 bg-dark-700 text-gray-300 py-2 rounded-lg text-sm hover:bg-dark-600">{t.common.cancel}</button>
            </div>
          </div>
        </div>
      )}
    </div>
  );
};

  const [showForm, setShowForm] = useState(false);
  const [articleTitle, setArticleTitle] = useState('');
  const [articleContent, setArticleContent] = useState('');
  const [articleCategory, setArticleCategory] = useState('news');
  const isAdmin = ['superadmin', 'admin', 'ministry_leader'].includes(currentUser?.role);
  const magazines = (data.magazines || []).filter(m => m.isPublished).sort((a, b) => new Date(b.publishedAt) - new Date(a.publishedAt));
  const articles = data.magazineArticles || [];
  const catColors = { testimony:'bg-purple-500/20 text-purple-400', devotional:'bg-blue-500/20 text-blue-400', events:'bg-green-500/20 text-green-400', interview:'bg-orange-500/20 text-orange-400', news:'bg-gray-500/20 text-gray-400' };

  const handleCreateMagazine = () => {
    const mag = { id: Date.now().toString(), ministryId: null, title: `Edition ${(magazines.length || 0) + 1}`, editionNumber: (magazines.length || 0) + 1, coverImageUrl: null, isPublished: true, publishedAt: new Date().toISOString(), createdBy: currentUser.id, createdAt: new Date().toISOString() };
    updateData('magazines', [...(data.magazines || []), mag]);
  };

  const handleAddArticle = (magId) => {
    if (!articleTitle.trim() || !articleContent.trim()) return;
    const art = { id: Date.now().toString(), magazineId: magId, title: articleTitle, content: articleContent, authorId: currentUser.id, category: articleCategory, coverImageUrl: null, estimatedReadMinutes: Math.max(1, Math.ceil(articleContent.split(' ').length / 200)), publishedAt: new Date().toISOString(), createdAt: new Date().toISOString() };
    updateData('magazineArticles', [...(data.magazineArticles || []), art]);
    setArticleTitle(''); setArticleContent(''); setShowForm(false);
  };

  return (
    <div>
      <div className="flex items-center justify-between mb-6">
        <h2 className="text-2xl font-bold text-white">📰 {t.community.magazine}</h2>
        {isAdmin && <button onClick={handleCreateMagazine} className="bg-gold-500 text-dark-900 px-4 py-2 rounded-lg text-sm font-semibold hover:bg-gold-400 transition-colors">{t.community.newMagazine}</button>}
      </div>
      {magazines.map(mag => {
        const magArticles = articles.filter(a => a.magazineId === mag.id);
        return (
          <div key={mag.id} className="bg-dark-800 border border-dark-700 rounded-xl p-5 mb-4">
            <div className="flex items-center justify-between mb-4">
              <div>
                <span className="text-[10px] bg-blue-500/20 text-blue-400 px-2 py-0.5 rounded-full font-semibold">Vol. {mag.editionNumber}</span>
                <h3 className="text-white font-bold text-lg mt-1">{mag.title}</h3>
                <div className="text-xs text-gray-500">{new Date(mag.publishedAt).toLocaleDateString()}</div>
              </div>
              {isAdmin && <button onClick={() => setShowForm(showForm === mag.id ? false : mag.id)} className="text-xs text-gold-400 hover:text-gold-300">{t.community.newArticle}</button>}
            </div>
            {showForm === mag.id && (
              <div className="bg-dark-700 rounded-lg p-3 mb-4">
                <input value={articleTitle} onChange={e => setArticleTitle(e.target.value)} placeholder={t.community.articleTitle} className="w-full bg-dark-600 text-white px-3 py-2 rounded-lg text-sm mb-2 border border-dark-500 outline-none"/>
                <textarea value={articleContent} onChange={e => setArticleContent(e.target.value)} placeholder={t.community.articleContent} rows={3} className="w-full bg-dark-600 text-white px-3 py-2 rounded-lg text-sm mb-2 border border-dark-500 outline-none resize-none"/>
                <div className="flex gap-2 items-center">
                  <select value={articleCategory} onChange={e => setArticleCategory(e.target.value)} className="bg-dark-600 text-white text-sm px-2 py-1.5 rounded-lg border border-dark-500">
                    {['testimony','devotional','events','interview','news'].map(c => <option key={c} value={c}>{t.community[c]}</option>)}
                  </select>
                  <button onClick={() => handleAddArticle(mag.id)} className="bg-gold-500 text-dark-900 px-3 py-1.5 rounded-lg text-sm font-semibold hover:bg-gold-400">{t.community.publish}</button>
                </div>
              </div>
            )}
            <div className="space-y-2">
              {magArticles.map(a => {
                const author = (data.users || []).find(u => u.id === a.authorId);
                return (
                  <div key={a.id} className="p-3 rounded-lg bg-dark-700/50 hover:bg-dark-700 transition-colors">
                    <div className="flex items-center gap-2 mb-1">
                      <span className={`text-[9px] px-1.5 py-0.5 rounded-full ${catColors[a.category] || catColors.news}`}>{a.category}</span>
                    </div>
                    <div className="text-white font-medium text-sm">{a.title}</div>
                    <p className="text-gray-400 text-xs mt-1 line-clamp-3">{a.content}</p>
                    <div className="text-[10px] text-gray-600 mt-2">{author?.firstName} {author?.lastName} · {a.estimatedReadMinutes} {t.community.readMinutes}</div>
                  </div>
                );
              })}
              {magArticles.length === 0 && <p className="text-gray-500 text-sm text-center py-3">{t.community.noMagazines}</p>}
            </div>
          </div>
        );
      })}
      {magazines.length === 0 && <p className="text-gray-500 text-center py-8">{t.community.noMagazines}</p>}
    </div>
  );
};
