const PermissionsPanel = ({ data, updateData, t }) => {
  const rp = data.rolePermissions || EMPTY_DATA.rolePermissions;
  const [perms, setPerms] = useState({ ...EMPTY_DATA.rolePermissions, ...rp });
  const [saved, setSaved] = useState(false);
  const [editRole, setEditRole] = useState('admin');

  const allPages = [
    { id:'dashboard', label:t.nav.dashboard, icon:'dashboard', always:true },
    { id:'members', label:t.nav.members, icon:'users' },
    { id:'attendance', label:t.nav.attendance||'Attendance', icon:'attendance' },
    { id:'events', label:t.nav.events, icon:'calendar' },
    { id:'finance', label:t.nav.finance, icon:'wallet' },
    { id:'groups', label:t.nav.groups, icon:'groups' },
    { id:'accounts', label:t.auth.accounts, icon:'shield' },
    { id:'feed', label:t.social.feed, icon:'list' },
    { id:'spaces', label:t.social.spaces, icon:'video' },
    { id:'ranking', label:t.social.ranking, icon:'trending_up' },
    { id:'community', label:t.community?.hub||'Community Hub', icon:'dashboard' },
    { id:'magazine', label:t.community?.magazine||'Magazine', icon:'book' },
    { id:'prayer_wall', label:t.community?.prayerWall||'Prayer Wall', icon:'heart' },
    { id:'announcements_page', label:t.community?.announcements||'Announcements', icon:'bell' },
    { id:'pastor_word', label:t.community?.pastorWord||"Pastor's Word", icon:'star' },
    { id:'fundraising_page', label:t.community?.fundraising||'Fundraising', icon:'heart' },
  ];

  const editableRoles = [
    { key:'admin', label:t.auth.roleAdmin||'Admin', color:'badge-purple', desc:t.auth.roleAdminDesc },
    { key:'ministry_leader', label:t.auth.roleMinistryLeader||'Ministry Leader', color:'badge-yellow', desc:t.auth.roleMinistryLeaderDesc },
    { key:'member', label:t.auth.roleMember||'Member', color:'badge-blue', desc:t.auth.roleMemberDesc },
  ];

  const togglePage = (pageId) => {
    if (pageId === 'dashboard') return; // dashboard always accessible
    const current = perms[editRole] || [];
    const newList = current.includes(pageId) ? current.filter(p => p !== pageId) : [...current, pageId];
    setPerms(prev => ({ ...prev, [editRole]: newList }));
  };

  const handleSave = () => {
    updateData('rolePermissions', perms);
    setSaved(true);
    setTimeout(() => setSaved(false), 2000);
  };

  return (
    <div className="p-5 space-y-4">
      <div className="flex items-center gap-3 mb-2">
        <div className="w-10 h-10 bg-purple-900/30 rounded-xl flex items-center justify-center text-purple-400">
          <Icon name="shield" size={20}/>
        </div>
        <div>
          <h3 className="font-bold text-gold-400">{t.auth.permissions}</h3>
          <p className="text-xs text-gray-500">{t.auth.permissionsDesc}</p>
        </div>
      </div>

      {saved && <div className="bg-green-900/30 text-green-400 text-sm rounded-lg px-4 py-2">{t.auth.permissionsSaved}</div>}

      {/* Role Tabs */}
      <div className="flex gap-2">
        {editableRoles.map(r => (
          <button key={r.key} onClick={() => setEditRole(r.key)}
            className={`flex-1 p-3 rounded-xl border-2 transition-all text-center ${editRole === r.key ? 'border-gold-500 bg-gold-500/10' : 'border-dark-600 hover:border-dark-500'}`}>
            <span className={`badge ${r.color} text-xs`}>{r.label}</span>
            <p className="text-[10px] text-gray-500 mt-1">{r.desc}</p>
          </button>
        ))}
      </div>

      {/* Page toggles */}
      <div className="bg-dark-900 rounded-xl p-4">
        <p className="text-sm text-gray-400 mb-3">{t.auth.selectPages}</p>
        <div className="grid grid-cols-2 md:grid-cols-3 gap-2">
          {allPages.map(pg => {
            const active = pg.always || (perms[editRole] || []).includes(pg.id);
            return (
              <button key={pg.id} onClick={() => togglePage(pg.id)} disabled={pg.always}
                className={`flex items-center gap-2 p-2.5 rounded-lg border transition-all text-left text-sm ${active ? 'border-green-600 bg-green-900/20 text-green-400' : 'border-dark-600 text-gray-500 hover:border-dark-500'} ${pg.always ? 'opacity-60 cursor-not-allowed' : ''}`}>
                <div className={`w-5 h-5 rounded flex-shrink-0 flex items-center justify-center text-xs border ${active ? 'bg-green-600 border-green-600 text-white' : 'border-dark-500'}`}>
                  {active && <Icon name="check" size={12}/>}
                </div>
                <Icon name={pg.icon} size={14} className="flex-shrink-0"/>
                <span className="truncate">{pg.label}</span>
              </button>
            );
          })}
        </div>
      </div>

      <Btn variant="gold" onClick={handleSave} className="w-full"><Icon name="save" size={15}/>{t.common.save}</Btn>
    </div>
  );
};

const Accounts = ({ data, updateData, t, currentUser }) => {
  const [confirm, setConfirm] = useState(null);
  const [confirmType, setConfirmType] = useState('delete');
  const [tab, setTab] = useState('pending');
  const [roleModal, setRoleModal] = useState(null);
  const [selectedRole, setSelectedRole] = useState('member');
  const [selectedGroup, setSelectedGroup] = useState('');
  const [userPerms, setUserPerms] = useState([]);
  const users = data.users || [];

  const pendingUsers = users.filter(u => u.status === 'pending');
  const approvedUsers = users.filter(u => u.status === 'approved');
  const rejectedUsers = users.filter(u => u.status === 'rejected');

  const handleApprove = async (userId) => {
    try {
      await api.put('/users/' + userId + '/approve');
      const updated = users.map(u => u.id === userId ? { ...u, status: 'approved' } : u);
      updateData('users', updated);
    } catch (e) { console.error('Approve failed', e); }
    setConfirm(null);
  };

  const handleReject = async (userId) => {
    try {
      await api.put('/users/' + userId + '/reject');
      const updated = users.map(u => u.id === userId ? { ...u, status: 'rejected' } : u);
      updateData('users', updated);
    } catch (e) { console.error('Reject failed', e); }
    setConfirm(null);
  };

  const handleDelete = (userId) => {
    updateData('users', users.filter(u => u.id !== userId));
    setConfirm(null);
  };

  const handleRoleChange = async () => {
    if (!roleModal) return;
    try {
      await api.put('/users/' + roleModal.id, { role: selectedRole });
      const updated = users.map(u => u.id === roleModal.id ? { ...u, role: selectedRole, assignedGroupId: selectedRole === 'ministry_leader' ? (selectedGroup || null) : null } : u);
      updateData('users', updated);
      // Save per-user permissions
      const newUserPerms = { ...(data.userPermissions || {}), [roleModal.id]: userPerms };
      updateData('userPermissions', newUserPerms);
    } catch (e) { console.error('Role change failed', e); }
    setRoleModal(null);
  };

  const openRoleModal = (user) => {
    const role = user.role || 'member';
    setSelectedRole(role);
    setSelectedGroup(user.assignedGroupId || '');
    const existingUserPerms = (data.userPermissions || {})[user.id];
    const rp = data.rolePermissions || EMPTY_DATA.rolePermissions;
    setUserPerms(existingUserPerms || rp[role] || rp.member || []);
    setRoleModal(user);
  };

  const showConfirm = (userId, type) => {
    setConfirmType(type);
    setConfirm(userId);
  };

  const confirmMessage = confirmType === 'approve' ? t.auth.approveConfirm : confirmType === 'reject' ? t.auth.rejectConfirm : t.auth.deleteUser;
  const confirmAction = confirmType === 'approve' ? () => handleApprove(confirm) : confirmType === 'reject' ? () => handleReject(confirm) : () => handleDelete(confirm);

  const avatarColor = (role) => {
    if (role === 'superadmin') return 'bg-gradient-to-br from-red-500 to-red-700 text-white';
    if (role === 'admin') return 'bg-gradient-to-br from-purple-500 to-purple-700 text-white';
    if (role === 'ministry_leader') return 'bg-gradient-to-br from-yellow-500 to-yellow-700 text-dark-900';
    return 'bg-gradient-to-br from-gold-500 to-gold-700 text-dark-900';
  };

  const VerificationBadges = ({ user }) => (
    <div className="flex gap-1 mt-1 flex-wrap">
      {user.registrationMethod && (
        <span className="badge badge-gray text-[10px]">
          {user.registrationMethod === 'google' ? t.auth.regGoogle : user.registrationMethod === 'phone' ? t.auth.regPhone : t.auth.regEmail}
        </span>
      )}
      {user.emailVerified && <span className="badge badge-green text-[10px]">{t.auth.emailVerified}</span>}
      {user.phoneVerified && <span className="badge badge-green text-[10px]">{t.auth.phoneVerified}</span>}
      {!user.emailVerified && !user.phoneVerified && user.registrationMethod !== 'google' && (
        <span className="badge badge-red text-[10px]">{t.auth.notVerified}</span>
      )}
    </div>
  );

  const UserRow = ({ u, showActions = true }) => {
    const canEdit = isSuperAdmin(currentUser) && u.id !== currentUser.id && u.status !== 'pending';
    return (
    <tr key={u.id} className="table-row">
      <td className="px-4 py-3">
        <div className="flex items-center gap-2.5 cursor-pointer" onClick={() => canEdit && openRoleModal(u)}>
          {u.avatar ? <img src={u.avatar} className="w-8 h-8 rounded-full object-cover flex-shrink-0"/> :
          <div className={`w-8 h-8 rounded-full flex items-center justify-center text-xs font-bold flex-shrink-0 ${avatarColor(u.role)}`}>
            {u.firstName?.[0] || '?'}{u.lastName?.[0] || ''}
          </div>}
          <div>
            <div className={`font-semibold text-white ${canEdit ? 'hover:text-gold-400 transition-colors' : ''}`}>{u.firstName} {u.lastName}</div>
            <VerificationBadges user={u} />
          </div>
        </div>
      </td>
      <td className="px-4 py-3 text-gray-400 hidden md:table-cell">{u.email || '—'}</td>
      <td className="px-4 py-3 text-gray-400 hidden sm:table-cell">{u.phone || '—'}</td>
      <td className="px-4 py-3">
        <span className={`badge ${getRoleBadgeClass(u.role)}`}>{getRoleLabel(u.role, t)}</span>
      </td>
      <td className="px-4 py-3 text-gray-500 hidden lg:table-cell">{formatDate(u.createdAt)}</td>
      {showActions && (
        <td className="px-4 py-3">
          <div className="flex items-center justify-end gap-1">
            {u.status === 'pending' && <>
              <button onClick={() => showConfirm(u.id, 'approve')} title={t.auth.approve}
                className="p-1.5 rounded-lg transition-colors hover:bg-green-900/30 text-green-400">
                <Icon name="check" size={15} />
              </button>
              <button onClick={() => showConfirm(u.id, 'reject')} title={t.auth.reject}
                className="p-1.5 rounded-lg transition-colors hover:bg-red-900/30 text-red-400">
                <Icon name="x" size={15} />
              </button>
            </>}
            {u.status !== 'pending' && isSuperAdmin(currentUser) && u.id !== currentUser.id && (
              <button onClick={() => openRoleModal(u)} title={t.auth.assignRole}
                className="p-1.5 rounded-lg transition-colors hover:bg-purple-900/30 text-purple-400">
                <Icon name="shield" size={15} />
              </button>
            )}
            {u.id !== currentUser.id && (
              <button onClick={() => showConfirm(u.id, 'delete')} className="p-1.5 hover:bg-red-900/30 rounded-lg text-red-400 transition-colors">
                <Icon name="trash" size={15} />
              </button>
            )}
          </div>
        </td>
      )}
    </tr>
  );};

  const UserTable = ({ userList, showActions = true }) => (
    userList.length === 0
      ? <EmptyState icon="users" message={t.auth.noAccounts} />
      : <div className="overflow-x-auto">
          <table className="w-full text-sm">
            <thead className="bg-dark-900 text-gray-400">
              <tr>
                <th className="text-left px-4 py-3 font-medium">{t.common.name}</th>
                <th className="text-left px-4 py-3 font-medium hidden md:table-cell">{t.auth.email}</th>
                <th className="text-left px-4 py-3 font-medium hidden sm:table-cell">{t.auth.phone}</th>
                <th className="text-left px-4 py-3 font-medium">{t.auth.role}</th>
                <th className="text-left px-4 py-3 font-medium hidden lg:table-cell">{t.auth.registeredOn}</th>
                {showActions && <th className="text-right px-4 py-3 font-medium">{t.common.actions}</th>}
              </tr>
            </thead>
            <tbody className="divide-y divide-dark-700">
              {userList.map(u => <UserRow key={u.id} u={u} showActions={showActions} />)}
            </tbody>
          </table>
        </div>
  );

  const isSA = isSuperAdmin(currentUser);

  const tabs = [
    { id: 'pending', label: t.auth.pendingAccounts, count: pendingUsers.length, color: 'text-yellow-400' },
    { id: 'approved', label: t.auth.approvedAccounts, count: approvedUsers.length, color: 'text-green-400' },
    { id: 'rejected', label: t.auth.rejectedAccounts, count: rejectedUsers.length, color: 'text-red-400' },
    ...(isSA ? [{ id: 'permissions', label: t.auth.permissions || 'Permissions', count: 0, color: 'text-purple-400' }] : []),
  ];

  return (
    <div className="space-y-4 fade-in">
      <div className="card p-4">
        <div className="flex items-center gap-3">
          <div className="w-10 h-10 bg-purple-900/30 rounded-xl flex items-center justify-center text-purple-400">
            <Icon name="shield" size={20} />
          </div>
          <div>
            <h3 className="font-bold text-gold-400">{t.auth.manageUsers}</h3>
            <p className="text-sm text-gray-500">{users.length} {t.auth.registeredUsers.toLowerCase()}</p>
          </div>
        </div>
      </div>

      {/* Tabs */}
      <div className="flex gap-1 bg-dark-800 rounded-xl p-1">
        {tabs.map(tb => (
          <button key={tb.id} onClick={() => setTab(tb.id)}
            className={`flex-1 flex items-center justify-center gap-2 px-4 py-2.5 rounded-lg text-sm font-medium transition-colors ${tab === tb.id ? 'bg-dark-700 text-white' : 'text-gray-500 hover:text-gray-300'}`}>
            <span>{tb.label}</span>
            {tb.count > 0 && <span className={`text-xs font-bold px-1.5 py-0.5 rounded-full ${tab === tb.id ? 'bg-gold-500/20 text-gold-400' : 'bg-dark-600 text-gray-400'}`}>{tb.count}</span>}
          </button>
        ))}
      </div>

      {/* User Table */}
      <div className="card overflow-hidden">
        {tab === 'pending' && <UserTable userList={pendingUsers} />}
        {tab === 'approved' && <UserTable userList={approvedUsers} />}
        {tab === 'rejected' && <UserTable userList={rejectedUsers} />}
        {tab === 'permissions' && isSA && <PermissionsPanel data={data} updateData={updateData} t={t}/>}
      </div>

      {/* Role & Permissions Assignment Modal */}
      {roleModal && (
        <div className="modal-backdrop" onClick={() => setRoleModal(null)}>
          <div className="modal p-6 fade-in max-h-[90vh] overflow-y-auto" onClick={e => e.stopPropagation()}>
            <h3 className="text-lg font-bold text-gold-400 mb-4">{t.auth.assignRole}: {roleModal.firstName} {roleModal.lastName}</h3>
            <div className="space-y-2 mb-4">
              {ROLES.map(role => (
                <button key={role} onClick={() => {
                  setSelectedRole(role);
                  const rp = data.rolePermissions || EMPTY_DATA.rolePermissions;
                  setUserPerms(rp[role] || rp.member || []);
                }}
                  className={`w-full flex items-center gap-3 p-3 rounded-xl border transition-colors ${selectedRole === role ? 'border-gold-500 bg-gold-500/10' : 'border-dark-600 hover:border-dark-500'}`}>
                  <span className={`badge ${getRoleBadgeClass(role)}`}>{getRoleLabel(role, t)}</span>
                  <span className="text-xs text-gray-500 flex-1 text-left">
                    {role === 'superadmin' ? t.auth.roleSuperAdminDesc : role === 'admin' ? t.auth.roleAdminDesc : role === 'ministry_leader' ? t.auth.roleMinistryLeaderDesc : t.auth.roleMemberDesc}
                  </span>
                </button>
              ))}
            </div>
            {selectedRole === 'ministry_leader' && data.groups.length > 0 && (
              <div className="mb-4">
                <Select label={t.groups.title} value={selectedGroup} onChange={e => setSelectedGroup(e.target.value)}
                  options={[{ value: '', label: t.common.select }, ...data.groups.map(g => ({ value: String(g.id), label: g.name }))]} />
              </div>
            )}
            {selectedRole !== 'superadmin' && (
              <div className="mb-4">
                <h4 className="text-sm font-semibold text-white mb-2">{t.auth.pageAccess || 'Page Access'}</h4>
                <div className="grid grid-cols-2 gap-1.5">
                  {[
                    { id:'dashboard', label:t.nav.dashboard, icon:'dashboard', always:true },
                    { id:'members', label:t.nav.members, icon:'users' },
                    { id:'attendance', label:t.nav.attendance||'Attendance', icon:'attendance' },
                    { id:'events', label:t.nav.events, icon:'calendar' },
                    { id:'finance', label:t.nav.finance, icon:'wallet' },
                    { id:'groups', label:t.nav.groups, icon:'groups' },
                    { id:'accounts', label:t.auth.accounts||'Accounts', icon:'shield' },
                    { id:'feed', label:t.social.feed, icon:'list' },
                    { id:'spaces', label:t.social.spaces, icon:'video' },
                    { id:'ranking', label:t.social.ranking, icon:'trending_up' },
                    { id:'community', label:t.community?.hub||'Community', icon:'dashboard' },
                    { id:'magazine', label:t.community?.magazine||'Magazine', icon:'book' },
                    { id:'prayer_wall', label:t.community?.prayerWall||'Prayer Wall', icon:'heart' },
                    { id:'announcements_page', label:t.community?.announcements||'Announcements', icon:'bell' },
                    { id:'pastor_word', label:t.community?.pastorWord||"Pastor's Word", icon:'star' },
                    { id:'fundraising_page', label:t.community?.fundraising||'Fundraising', icon:'heart' },
                  ].map(pg => {
                    const checked = pg.always || userPerms.includes(pg.id);
                    return (
                      <label key={pg.id} className={`flex items-center gap-2 p-2 rounded-lg border text-xs cursor-pointer transition-colors ${checked ? 'border-green-600 bg-green-900/20 text-white' : 'border-dark-600 text-gray-500'}`}>
                        <input type="checkbox" checked={checked} disabled={pg.always}
                          onChange={() => {
                            if (pg.always) return;
                            setUserPerms(prev => prev.includes(pg.id) ? prev.filter(p => p !== pg.id) : [...prev, pg.id]);
                          }}
                          className="accent-green-500 w-3.5 h-3.5"/>
                        <Icon name={pg.icon} size={13}/> {pg.label}
                      </label>
                    );
                  })}
                </div>
              </div>
            )}
            <div className="flex justify-end gap-2">
              <Btn variant="ghost" onClick={() => setRoleModal(null)}>{t.common.cancel}</Btn>
              <Btn onClick={handleRoleChange}>{t.common.save}</Btn>
            </div>
          </div>
        </div>
      )}

      <ConfirmModal isOpen={!!confirm} message={confirmMessage} onConfirm={confirmAction} onCancel={() => setConfirm(null)} t={t} />
    </div>
  );
};

// THEME CONFIG
// =====================================================================
const THEMES = {
  gold: { primary:'#C9A84C', primaryLight:'#F0D080', primaryDark:'#a07e30', accent:'rgba(201,168,76,', bg900:'#1a1a1a', bg800:'#2d2d2d', bg700:'#3a3a3a', name:'Gold' },
  blue: { primary:'#3B82F6', primaryLight:'#60A5FA', primaryDark:'#2563EB', accent:'rgba(59,130,246,', bg900:'#0f172a', bg800:'#1e293b', bg700:'#334155', name:'Blue' },
  green: { primary:'#10B981', primaryLight:'#34D399', primaryDark:'#059669', accent:'rgba(16,185,129,', bg900:'#0f1f1a', bg800:'#1a2f28', bg700:'#2a3f35', name:'Green' },
  purple: { primary:'#8B5CF6', primaryLight:'#A78BFA', primaryDark:'#7C3AED', accent:'rgba(139,92,246,', bg900:'#1a1625', bg800:'#2d2540', bg700:'#3a3555', name:'Purple' },
};

const applyTheme = (themeKey) => {
  const th = THEMES[themeKey] || THEMES.gold;
  document.documentElement.style.setProperty('--primary', th.primary);
  document.documentElement.style.setProperty('--primary-light', th.primaryLight);
  // Apply CSS overrides dynamically
  const existing = document.getElementById('theme-overrides');
  if (existing) existing.remove();
  if (themeKey === 'gold') return; // gold is the default, no overrides needed
  const style = document.createElement('style');
  style.id = 'theme-overrides';
  style.textContent = `
    body { background: ${th.bg900}; }
    .sidebar { background: linear-gradient(180deg, ${th.bg900} 0%, ${th.bg900} 100%); }
    .text-gold-400 { color: ${th.primaryLight} !important; }
    .text-gold-500 { color: ${th.primary} !important; }
    .bg-gold-500\\/10, .bg-gold-500\\/15, .bg-gold-500\\/20 { background: ${th.accent}0.15) !important; }
    .from-gold-500 { --tw-gradient-from: ${th.primary} !important; }
    .to-gold-700 { --tw-gradient-to: ${th.primaryDark} !important; }
    .border-gold-500 { border-color: ${th.primary} !important; }
    .hover\\:text-gold-400:hover { color: ${th.primaryLight} !important; }
    .hover\\:text-gold-500:hover { color: ${th.primary} !important; }
    .bg-dark-900 { background: ${th.bg900} !important; }
    .bg-dark-800 { background: ${th.bg800} !important; }
    .bg-dark-700 { background: ${th.bg700} !important; }
    .card { background: ${th.bg800} !important; }
    .border-dark-700 { border-color: ${th.bg700} !important; }
    .nav-item.active { border-left-color: ${th.primary} !important; background: ${th.accent}0.15) !important; }
    .nav-item:hover { background: ${th.accent}0.1) !important; }
    .glow { box-shadow: 0 0 40px ${th.accent}0.3) !important; }
    .auth-card { background: ${th.bg800} !important; }
    .auth-bg { background: linear-gradient(135deg, ${th.bg900} 0%, ${th.bg800} 50%, ${th.bg900} 100%) !important; }
    input, select, textarea { background: ${th.bg700} !important; }
  `;
  document.head.appendChild(style);
};

// =====================================================================
// CERTIFICATE GENERATOR
// =====================================================================
const CertificateModal = ({ isOpen, onClose, t, data }) => {
  const [selectedUser, setSelectedUser] = useState('');
  const [certYear, setCertYear] = useState(new Date().getFullYear().toString());
  const canvasRef = useRef(null);

  const generateCertificate = () => {
    const user = data.users.find(u => u.id == selectedUser);
    if (!user) return;
    const canvas = canvasRef.current;
    if (!canvas) return;
    const ctx = canvas.getContext('2d');
    canvas.width = 1200; canvas.height = 850;

    // Background gradient
    const grad = ctx.createLinearGradient(0, 0, 1200, 850);
    grad.addColorStop(0, '#1a1a2e'); grad.addColorStop(0.5, '#16213e'); grad.addColorStop(1, '#0f3460');
    ctx.fillStyle = grad; ctx.fillRect(0, 0, 1200, 850);

    // Gold border
    ctx.strokeStyle = '#C9A84C'; ctx.lineWidth = 4;
    ctx.strokeRect(30, 30, 1140, 790);
    ctx.strokeStyle = '#C9A84C66'; ctx.lineWidth = 1;
    ctx.strokeRect(40, 40, 1120, 770);

    // Corner decorations
    const drawCorner = (x, y, flipX, flipY) => {
      ctx.save(); ctx.translate(x, y); ctx.scale(flipX, flipY);
      ctx.strokeStyle = '#C9A84C'; ctx.lineWidth = 2;
      ctx.beginPath(); ctx.moveTo(0, 50); ctx.lineTo(0, 0); ctx.lineTo(50, 0); ctx.stroke();
      ctx.beginPath(); ctx.arc(0, 0, 20, 0, Math.PI/2); ctx.stroke();
      ctx.restore();
    };
    drawCorner(50, 50, 1, 1); drawCorner(1150, 50, -1, 1);
    drawCorner(50, 800, 1, -1); drawCorner(1150, 800, -1, -1);

    // Church logo watermark circle
    ctx.globalAlpha = 0.08;
    ctx.beginPath(); ctx.arc(600, 425, 200, 0, Math.PI*2);
    ctx.fillStyle = '#C9A84C'; ctx.fill();
    ctx.globalAlpha = 1;

    // Cross symbol at top
    ctx.fillStyle = '#C9A84C'; ctx.font = '48px serif';
    ctx.textAlign = 'center'; ctx.fillText('✝', 600, 110);

    // Church name
    ctx.fillStyle = '#C9A84C'; ctx.font = 'bold 18px "Segoe UI", sans-serif';
    ctx.fillText(t.common.certChurch, 600, 150);

    // Title
    ctx.fillStyle = '#FFFFFF'; ctx.font = 'bold 42px "Segoe UI", serif';
    ctx.fillText(t.common.certTitle, 600, 230);

    // Decorative line
    ctx.strokeStyle = '#C9A84C'; ctx.lineWidth = 2;
    ctx.beginPath(); ctx.moveTo(350, 255); ctx.lineTo(850, 255); ctx.stroke();

    // Body text
    ctx.fillStyle = '#E0E0E0'; ctx.font = '18px "Segoe UI", sans-serif';
    ctx.fillText(t.common.certBody, 600, 300);

    // Awarded to
    ctx.fillStyle = '#C9A84C88'; ctx.font = '16px "Segoe UI", sans-serif';
    ctx.fillText(t.common.certAwardedTo, 600, 360);

    // User name
    ctx.fillStyle = '#FFFFFF'; ctx.font = 'bold 48px "Segoe UI", serif';
    ctx.fillText(`${user.firstName} ${user.lastName}`, 600, 420);

    // Stars earned
    const userStars = (data.stars||[]).filter(s => s.toUserId === user.id).reduce((sum, s) => sum + (s.count||1), 0);
    const userRank = (() => {
      const allUsers = data.users.filter(u=>u.status==='approved'||u.id===1);
      const ranked = allUsers.map(u => ({id:u.id, stars:(data.stars||[]).filter(s=>s.toUserId===u.id).reduce((s2,st)=>s2+(st.count||1),0)})).sort((a,b)=>b.stars-a.stars);
      const idx = ranked.findIndex(r=>r.id===user.id);
      return idx>=0 ? idx+1 : '-';
    })();

    ctx.fillStyle = '#C9A84C'; ctx.font = '22px "Segoe UI", sans-serif';
    ctx.fillText(`⭐ ${t.common.certStars}: ${userStars}  |  ${t.common.certRank}: #${userRank}`, 600, 480);

    // Year
    ctx.fillStyle = '#E0E0E0'; ctx.font = '20px "Segoe UI", sans-serif';
    ctx.fillText(`${t.common.certForYear} ${certYear}`, 600, 530);

    // Decorative bottom line
    ctx.strokeStyle = '#C9A84C'; ctx.lineWidth = 1;
    ctx.beginPath(); ctx.moveTo(250, 600); ctx.lineTo(950, 600); ctx.stroke();

    // Signature line
    ctx.fillStyle = '#C9A84C88'; ctx.font = '14px "Segoe UI", sans-serif';
    ctx.fillText('_______________________________', 350, 680);
    ctx.fillText('_______________________________', 850, 680);
    ctx.fillStyle = '#E0E0E0'; ctx.font = '14px "Segoe UI", sans-serif';
    ctx.fillText(t.common.certPastor, 350, 710);
    ctx.fillText(t.common.certIssuedBy, 850, 710);

    // Date
    ctx.fillStyle = '#888'; ctx.font = '12px "Segoe UI", sans-serif';
    ctx.fillText(new Date().toLocaleDateString(), 600, 770);
  };

  const downloadCert = () => {
    const canvas = canvasRef.current; if (!canvas) return;
    const link = document.createElement('a');
    const user = data.users.find(u => u.id == selectedUser);
    link.download = `certificate_${user?.firstName}_${user?.lastName}_${certYear}.png`;
    link.href = canvas.toDataURL('image/png');
    link.click();
  };

  if (!isOpen) return null;
  const userOpts = [{value:'', label:t.common.select}, ...(data.users||[]).filter(u=>u.status==='approved'||u.id===1).map(u=>({value:u.id, label:`${u.firstName} ${u.lastName}`}))];

  return (
    <Modal isOpen={isOpen} onClose={onClose} title={t.common.certificates} maxWidth="max-w-3xl">
      <div className="space-y-4">
        <div className="grid grid-cols-2 gap-3">
          <Select label={t.common.name} value={selectedUser} onChange={setSelectedUser} options={userOpts}/>
          <Input label={t.common.certForYear} type="number" value={certYear} onChange={setCertYear}/>
        </div>
        <div className="flex gap-2">
          <Btn variant="gold" onClick={generateCertificate} disabled={!selectedUser}><Icon name="award" size={15}/>{t.common.certPreview}</Btn>
          <Btn variant="primary" onClick={downloadCert} disabled={!selectedUser}><Icon name="download" size={15}/>{t.common.download}</Btn>
        </div>
        <div className="border border-dark-600 rounded-lg overflow-hidden bg-dark-900">
          <canvas ref={canvasRef} style={{width:'100%',height:'auto'}} className="block"/>
        </div>
      </div>
    </Modal>
  );
};

// =====================================================================
// MAIN APP
// =====================================================================
function App() {
  const [lang, setLang] = useState(()=>storage.get('church_lang','en'));
  const [page, setPage] = useState('dashboard');
  const [collapsed, setCollapsed] = useState(false);
  const [profileOpen, setProfileOpen] = useState(false);
  const [portalMode, setPortalMode] = useState('admin'); // 'admin' or 'member'
  const [themeKey, setThemeKey] = useState(()=>storage.get('church_theme','gold'));
  const [themeOpen, setThemeOpen] = useState(false);
  const [certOpen, setCertOpen] = useState(false);

  const [data, setData] = useState({ ...EMPTY_DATA });
  const [currentUser, setCurrentUser] = useState(null);
  const [authLoading, setAuthLoading] = useState(!!api.getToken());

  const t = TR[lang] || TR.en;

  useEffect(()=>{ storage.set('church_lang', lang); }, [lang]);
  useEffect(()=>{ storage.set('church_theme', themeKey); applyTheme(themeKey); }, [themeKey]);

  const updateData = useCallback((key, value) => {
    setData(prev => ({ ...prev, [key]: value }));
  }, []);

  // Validate existing token on mount
  useEffect(() => {
    if (!api.getToken()) { setAuthLoading(false); return; }
    api.get('/auth/me').then(user => {
      setCurrentUser(user);
      storage.set('church_session', user);
      setAuthLoading(false);
    }).catch(() => {
      api.clearToken();
      storage.set('church_session', null);
      setAuthLoading(false);
    });
  }, []);

  // Load data from API once authenticated
  useEffect(() => {
    if (!currentUser) return;
    const load = async () => {
      try {
        const [membersRes, eventsRes, notifRes] = await Promise.all([
          api.get('/members?limit=500').catch(()=>({members:[]})),
          api.get('/events?limit=200').catch(()=>[]),
          api.get('/notifications').catch(()=>({notifications:[],unreadCount:0})),
        ]);
        setData(prev => ({
          ...prev,
          members: membersRes.members || membersRes || [],
          events: Array.isArray(eventsRes) ? eventsRes : [],
          notifications: notifRes.notifications || [],
        }));

        // Load admin data
        const isAdmin = ['superadmin','admin'].includes(currentUser.role);
        if (isAdmin) {
          const [finRes, usersRes, attRes, groupsRes] = await Promise.all([
            api.get('/finance?limit=500').catch(()=>({transactions:[]})),
            api.get('/users').catch(()=>[]),
            api.get('/attendance?limit=500').catch(()=>[]),
            api.get('/groups').catch(()=>[]),
          ]);
          setData(prev => ({
            ...prev,
            finance: finRes.transactions || [],
            users: Array.isArray(usersRes) ? usersRes : [],
            attendance: Array.isArray(attRes) ? attRes : [],
            groups: Array.isArray(groupsRes) ? groupsRes : [],
          }));
        } else {
          const groupsRes = await api.get('/groups').catch(()=>[]);
          setData(prev => ({ ...prev, groups: Array.isArray(groupsRes) ? groupsRes : [] }));
        }

        // Load social data
        const [postsRes, spacesRes, rankingRes] = await Promise.all([
          api.get('/feed?limit=50').catch(()=>[]),
          api.get('/spaces').catch(()=>[]),
          api.get('/stars/ranking').catch(()=>[]),
        ]);
        setData(prev => ({
          ...prev,
          posts: Array.isArray(postsRes) ? postsRes : [],
          spaces: Array.isArray(spacesRes) ? spacesRes : [],
          stars: Array.isArray(rankingRes) ? rankingRes : [],
        }));

        // Load community data
        const [pastorRes, prayerRes, announcementsRes, fundraisingRes] = await Promise.all([
          api.get('/community/pastor-messages').catch(()=>[]),
          api.get('/community/prayer-requests').catch(()=>[]),
          api.get('/community/announcements').catch(()=>[]),
          api.get('/community/fundraising').catch(()=>[]),
        ]);
        setData(prev => ({
          ...prev,
          pastorMessages: Array.isArray(pastorRes) ? pastorRes : [],
          prayerRequests: Array.isArray(prayerRes) ? prayerRes : [],
          announcements: Array.isArray(announcementsRes) ? announcementsRes : [],
          fundraisingCampaigns: Array.isArray(fundraisingRes) ? fundraisingRes : [],
        }));
      } catch (err) {
        console.error('Data load error:', err);
      }
    };
    load();
  }, [currentUser]);

  const handleLogin = (user) => {
    setCurrentUser(user);
    storage.set('church_session', user);
  };

  const handleLogout = () => {
    setCurrentUser(null);
    api.clearToken();
    storage.set('church_session', null);
    setData({ ...EMPTY_DATA });
    setPage('dashboard');
  };

  if (authLoading) {
    return (
      <div className="flex items-center justify-center h-screen bg-dark-900">
        <div className="text-center">
          <img src="/church-logo.png" alt="" className="w-20 h-20 mx-auto mb-4 rounded-xl" style={{objectFit:'contain'}}/>
          <div className="text-gold-400 text-lg font-semibold">El Shaddai Connect</div>
          <div className="mt-3 text-gray-500 text-sm">Loading...</div>
        </div>
      </div>
    );
  }

  if (!currentUser) {
    return <AuthScreen t={t} lang={lang} setLang={setLang} onLogin={handleLogin} data={data} updateData={updateData}/>;
  }

  // Portal switch: when in member mode, admin/superadmin sees only member pages
  const isAdminUser = ['superadmin','admin'].includes(currentUser.role);
  const effectiveRole = (isAdminUser && portalMode === 'member') ? 'member' : (currentUser.role || 'member');

  // Dynamic role-based page access from stored permissions
  const rp = data.rolePermissions || EMPTY_DATA.rolePermissions;
  const ALL_PAGES = ['dashboard','members','attendance','events','finance','groups','accounts','feed','spaces','ranking','community','magazine','prayer_wall','announcements_page','pastor_word','fundraising_page'];

  // Check user-specific overrides first, then fall back to role defaults
  const up = data.userPermissions || {};
  const canAccessPage = (pageId, role, userId) => {
    if (role === 'superadmin') return true;
    if (userId && up[userId]) return up[userId].includes(pageId);
    const rolePages = rp[role] || rp.member || [];
    return rolePages.includes(pageId);
  };

  const CommunityHubWrapper = (props) => <CommunityHub {...props} setPage={setPage}/>;

  const pages = {
    dashboard:Dashboard, members:Members, attendance:Attendance,
    events:Events, finance:Finance, groups:Groups, accounts:Accounts,
    feed:FeedPage, spaces:SpacesPage, ranking:RankingPage,
    community:CommunityHubWrapper, magazine:MagazinePage, prayer_wall:PrayerWallPage,
    announcements_page:AnnouncementsPage, pastor_word:PastorWordPage, fundraising_page:FundraisingPage,
  };

  // Guard: redirect to dashboard if user doesn't have access
  if (!canAccessPage(page, effectiveRole)) {
    setPage('dashboard');
  }

  const PageComponent = pages[page] || Dashboard;

  return (
    <div className="flex h-screen overflow-hidden bg-dark-900">
      <Sidebar page={page} setPage={setPage} t={t} lang={lang} setLang={setLang} collapsed={collapsed} setCollapsed={setCollapsed}
        currentUser={{...currentUser, role: effectiveRole}} canAccessPage={(pid) => canAccessPage(pid, effectiveRole, currentUser?.id)}/>
      <div className="flex-1 flex flex-col overflow-hidden min-w-0">
        <Header page={page} t={t} data={data} updateData={updateData} currentUser={currentUser} onLogout={handleLogout}
          onProfile={()=>setProfileOpen(true)} isAdminUser={isAdminUser} portalMode={portalMode} setPortalMode={setPortalMode}
          onTheme={()=>setThemeOpen(true)} onCert={()=>setCertOpen(true)}/>
        <main className="flex-1 overflow-y-auto p-5">
          <PageComponent data={data} updateData={updateData} t={t} currentUser={{...currentUser, role: effectiveRole}}/>
        </main>
      </div>
      <ProfileModal isOpen={profileOpen} onClose={()=>setProfileOpen(false)} t={t} currentUser={currentUser} data={data} updateData={updateData} setCurrentUser={setCurrentUser}/>
      <ThemeModal isOpen={themeOpen} onClose={()=>setThemeOpen(false)} t={t} currentTheme={themeKey} setTheme={setThemeKey}/>
      <CertificateModal isOpen={certOpen} onClose={()=>setCertOpen(false)} t={t} data={data}/>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
