    .modal-backdrop { position: fixed; inset: 0; background: rgba(0,0,0,0.7); z-index: 50; display: flex; align-items: center; justify-content: center; padding: 16px; }
    .modal { background: #2d2d2d; border-radius: 16px; width: 100%; max-width: 520px; max-height: 90vh; overflow-y: auto; box-shadow: 0 20px 60px rgba(0,0,0,0.5); border: 1px solid #3a3a3a; }

    .table-row:hover { background: #3a3a3a; }
    input, select, textarea { outline: none; background: #3a3a3a !important; color: #E0E0E0 !important; border-color: #555 !important; }
    input:focus, select:focus, textarea:focus { border-color: #C9A84C !important; box-shadow: 0 0 0 3px rgba(201,168,76,0.2); }

    ::-webkit-scrollbar { width: 6px; }

    ::-webkit-scrollbar-thumb { background: #555; border-radius: 3px; }
    .badge { display: inline-flex; align-items: center; padding: 2px 10px; border-radius: 99px; font-size: 12px; font-weight: 600; }
    .badge-green { background: #1a3a2a; color: #4ade80; }
    .badge-red { background: #3a1a1a; color: #f87171; }
    .badge-blue { background: #1a2a3a; color: #60a5fa; }
    .badge-yellow { background: #3a3520; color: #fbbf24; }
    .badge-purple { background: #2a1a3a; color: #c084fc; }
    .badge-gray { background: #3a3a3a; color: #9ca3af; }
    .progress-bar { height: 6px; border-radius: 3px; background: #3a3a3a; overflow: hidden; }
    .progress-fill { height: 100%; border-radius: 3px; transition: width 0.5s ease; }
    .auth-bg { background: linear-gradient(135deg, #111 0%, #1a1a1a 50%, #0d0d0d 100%); min-height: 100vh; }
    .auth-card { background: #2d2d2d; border-radius: 20px; box-shadow: 0 25px 80px rgba(0,0,0,0.6); border: 1px solid #3a3a3a; }

const storage = {
  get: (key, def) => { try { const v = localStorage.getItem(key); return v ? JSON.parse(v) : def; } catch { return def; } },
  set: (key, val) => { try { localStorage.setItem(key, JSON.stringify(val)); } catch {} }
};

// =====================================================================
// API CLIENT
// =====================================================================
const API_BASE = window.location.origin + '/api';
const api = {
  _token: storage.get('church_token', null),
  getToken() { return this._token; },
  setToken(t) { this._token = t; storage.set('church_token', t); },
  clearToken() { this._token = null; storage.set('church_token', null); },
  async request(path, options = {}) {
    const headers = { 'Content-Type': 'application/json', ...(options.headers || {}) };
    if (this._token) headers['Authorization'] = 'Bearer ' + this._token;
    const res = await fetch(API_BASE + path, { ...options, headers });
    if (res.status === 401) {
      this.clearToken();
      storage.set('church_session', null);
      window.location.reload();
      throw new Error('Session expired');
    }
    const json = await res.json().catch(() => ({}));
    if (!res.ok) throw { status: res.status, ...json };
    return json;
  },
  get(p) { return this.request(p); },
  post(p, body) { return this.request(p, { method:'POST', body: JSON.stringify(body) }); },
  put(p, body) { return this.request(p, { method:'PUT', body: JSON.stringify(body) }); },
  del(p) { return this.request(p, { method:'DELETE' }); },
};

      {icons[name] || null}

const Btn = ({ children, variant="primary", size="md", onClick, type="button", disabled=false, className="" }) => {
  const vars = {
    primary: "bg-gold-500 hover:bg-gold-600 text-dark-900",
    success: "bg-green-600 hover:bg-green-700 text-white",
    danger: "bg-red-700 hover:bg-red-800 text-white",
    ghost: "bg-transparent hover:bg-dark-700 text-gold-400 border border-dark-500",
    warning: "bg-amber-600 hover:bg-amber-700 text-white",
    purple: "bg-purple-700 hover:bg-purple-800 text-white",
    gold: "bg-gradient-to-r from-gold-500 to-gold-600 hover:from-gold-600 hover:to-gold-700 text-dark-900 font-bold",
  };
  const sizes = { sm:"px-3 py-1.5 text-xs", md:"px-4 py-2 text-sm", lg:"px-6 py-2.5 text-base" };

    <button type={type} onClick={onClick} disabled={disabled}

};

const generateCode = () => String(Math.floor(100000 + Math.random() * 900000));

// Role hierarchy: superadmin > admin > ministry_leader > member
const ROLES = ['superadmin', 'admin', 'ministry_leader', 'member'];
const roleLevel = (role) => ROLES.indexOf(role || 'member');
const canManage = (userRole) => roleLevel(userRole) <= 1; // superadmin or admin
const isSuperAdmin = (user) => user?.role === 'superadmin';
const isAdminOrAbove = (user) => roleLevel(user?.role) <= 1;
const getRoleLabel = (role, t) => {
  const labels = { superadmin: t.auth.roleSuperAdmin, admin: t.auth.roleAdmin, ministry_leader: t.auth.roleMinistryLeader, member: t.auth.roleMember };
  return labels[role] || t.auth.roleMember;
};
const getRoleBadgeClass = (role) => {
  const classes = { superadmin: 'badge-red', admin: 'badge-purple', ministry_leader: 'badge-yellow', member: 'badge-blue' };
  return classes[role] || 'badge-blue';
};

const AuthScreen = ({ t, lang, setLang, onLogin, data, updateData }) => {
  // mode: login | register | verify | pending | rejected
  const [mode, setMode] = useState('login');
  const [form, setForm] = useState({ emailOrPhone:'', password:'', confirmPassword:'', firstName:'', lastName:'', phone:'', email:'', address:'', birthDate:'', gender:'male' });
  const [error, setError] = useState('');
  const [showPw, setShowPw] = useState(false);
  const [verifyCode, setVerifyCode] = useState('');
  const [pendingUser, setPendingUser] = useState(null); // user object after registration
  const [generatedCode, setGeneratedCode] = useState('');
  const [codeSentMsg, setCodeSentMsg] = useState('');

  const langs = [
    { code:'en', flag:'🇺🇸', name:'English' },
    { code:'es', flag:'🇪🇸', name:'Español' },
    { code:'fr', flag:'🇫🇷', name:'Français' },
    { code:'ht', flag:'🇭🇹', name:'Kreyol' },
  ];

  const [loading, setLoading] = useState(false);

  const handleLogin = async () => {
    setError('');
    const { emailOrPhone, password } = form;
    if (!emailOrPhone || !password) { setError(t.auth.fillRequired); return; }
    setLoading(true);
    try {
      const res = await api.post('/auth/login', { username: emailOrPhone, password });
      api.setToken(res.token);
      onLogin(res.user);
    } catch (err) {
      if (err.error === 'pending') { setMode('pending'); }
      else if (err.error === 'rejected') { setError(err.message || 'Account rejected.'); }
      else { setError(err.error || t.auth.invalidCredentials); }
    } finally {
      setLoading(false);
    }
  };

  const handleRegister = async () => {
    setError('');
    const { firstName, lastName, password, confirmPassword } = form;
    const contact = form.email || form.phone;
    if (!firstName || !lastName || !contact || !password) { setError(t.auth.fillRequired); return; }
    if (password !== confirmPassword) { setError(t.auth.passwordMismatch); return; }
    setLoading(true);
    try {
      const res = await api.post('/auth/register', {
        email: form.email || undefined,
        phone: form.phone || undefined,
        password, firstName, lastName,
        gender: form.gender || 'male',
        address: form.address || undefined,
        birthDate: form.birthDate || undefined,
      });
      if (res.pending) {
        setMode('pending');
      } else {
        api.setToken(res.token);
        onLogin(res.user);
      }
    } catch (err) {
      setError(err.error || 'Registration failed');
    } finally {
      setLoading(false);
    }
  };

  const handleGoogleAuth = () => {
    // Google sign-in placeholder - would integrate Google Identity Services in production
    setError('Google sign-in will be available after deployment. Please register with email for now.');
  };

  const handleVerify = () => {
    setError('');
    if (!verifyCode) { setError(t.auth.fillRequired); return; }
    // Find user's stored code
    const latestUser = (data.users||[]).find(u => u.id === pendingUser.id);
    if (!latestUser || verifyCode !== latestUser.verificationCode) {
      setError(t.auth.codeInvalid); return;
    }
    // Mark as verified
    const updates = {};
    if (latestUser.registrationMethod === 'email') updates.emailVerified = true;
    if (latestUser.registrationMethod === 'phone') updates.phoneVerified = true;
    updates.verificationCode = null;
    const updatedUsers = (data.users||[]).map(u => u.id===pendingUser.id ? {...u, ...updates} : u);
    updateData('users', updatedUsers);
    setPendingUser({...pendingUser, ...updates});
    setMode('pending');
  };

  const handleResendCode = () => {
    const code = generateCode();
    setGeneratedCode(code);
    const updatedUsers = (data.users||[]).map(u => u.id===pendingUser.id ? {...u, verificationCode: code} : u);
    updateData('users', updatedUsers);
    setCodeSentMsg(t.auth.codeSent);
    setTimeout(()=>setCodeSentMsg(''), 3000);
  };

  const [authLangOpen, setAuthLangOpen] = useState(false);
  const authLangRef = useRef(null);
  const currentLang = langs.find(l=>l.code===lang) || langs[0];

  useEffect(() => {
    const handleClick = (e) => { if (authLangRef.current && !authLangRef.current.contains(e.target)) setAuthLangOpen(false); };
    document.addEventListener('mousedown', handleClick);
    return () => document.removeEventListener('mousedown', handleClick);
  }, []);

  const resetToLogin = () => {
    setMode('login'); setError(''); setPendingUser(null);
    setVerifyCode(''); setGeneratedCode(''); setCodeSentMsg('');
  };

  // Language dropdown (shared across all auth modes)
  const LangDropdown = () => (
    <div className="fixed top-4 right-4 z-10" ref={authLangRef}>
      <button onClick={()=>setAuthLangOpen(!authLangOpen)}
        className={`flex items-center gap-2 px-3 py-2 rounded-lg transition-all ${authLangOpen?'bg-dark-700 ring-1 ring-gold-500/30':'hover:bg-dark-700'}`}>
        <span className="text-base">{currentLang.flag}</span>
        <span className="text-sm text-gray-300 hidden sm:inline">{currentLang.name}</span>
        <Icon name="chevron_down" size={14} className={`text-gray-500 transition-transform ${authLangOpen?'rotate-180':''}`}/>
      </button>
      {authLangOpen && (
        <div className="absolute right-0 mt-1 bg-dark-800 border border-dark-600 rounded-xl shadow-xl overflow-hidden fade-in" style={{minWidth:'160px'}}>
          {langs.map(l=>(
            <button key={l.code} onClick={()=>{setLang(l.code);setAuthLangOpen(false);}}
              className={`w-full flex items-center gap-2.5 px-3 py-2.5 text-sm transition-colors ${lang===l.code?'bg-gold-500/15 text-gold-400':'text-gray-400 hover:bg-dark-700 hover:text-white'}`}>
              <span className="text-base">{l.flag}</span>
              <span className="flex-1 text-left">{l.name}</span>
              {lang===l.code && <Icon name="check" size={14} className="text-gold-400"/>}
            </button>
          ))}
        </div>
      )}
    </div>
  );

  // VERIFY screen
  if (mode === 'verify') {
    const isEmail = pendingUser?.registrationMethod === 'email';
    return (
      <div className="auth-bg flex items-center justify-center p-4">
        <LangDropdown/>
        <div className="auth-card w-full max-w-md p-8 fade-in">
          <div className="flex flex-col items-center mb-6">
            <div className="w-16 h-16 rounded-full bg-gold-500/20 flex items-center justify-center mb-4">
              <Icon name={isEmail?"mail":"phone"} size={28} className="text-gold-400"/>
            </div>
            <h2 className="text-xl font-bold text-gold-400">{t.auth.verifyTitle}</h2>
            <p className="text-sm text-gray-400 mt-2 text-center leading-relaxed">
              {isEmail ? t.auth.verifyEmailMessage : t.auth.verifyPhoneMessage}
            </p>
          </div>

          {error && (
            <div className="bg-red-900/30 border border-red-800 text-red-400 text-sm rounded-lg px-4 py-3 mb-4 flex items-center gap-2">
              <Icon name="info" size={16}/>{error}
            </div>
          )}
          {codeSentMsg && (
            <div className="bg-green-900/30 text-green-400 text-sm rounded-lg px-4 py-3 mb-4">{codeSentMsg}</div>
          )}

          <div className="space-y-4">
            <Input label={t.auth.enterCode} value={verifyCode} onChange={setVerifyCode}
              placeholder="000000" required icon={<Icon name="key" size={16}/>}/>

            {/* Simulated code display for demo */}
            <div className="bg-dark-900 border border-dark-600 rounded-lg px-4 py-3 text-center">
              <p className="text-[10px] text-gray-600 mb-1">{t.auth.simulatedNote}</p>
              <p className="text-2xl font-mono font-bold text-gold-400 tracking-[0.3em]">{generatedCode}</p>
            </div>

            <Btn variant="gold" size="lg" onClick={handleVerify} className="w-full">
              <Icon name="check" size={16}/>{t.auth.verifyBtn}
            </Btn>
            <div className="flex justify-between items-center">
              <button onClick={handleResendCode} className="text-sm text-gold-400 hover:underline">{t.auth.resendCode}</button>
              <button onClick={resetToLogin} className="text-sm text-gray-500 hover:text-gray-300">{t.auth.backToLogin}</button>
            </div>
          </div>
        </div>
      </div>
    );
  }

  // PENDING screen
  if (mode === 'pending') {
    return (
      <div className="auth-bg flex items-center justify-center p-4">
        <LangDropdown/>
        <div className="auth-card w-full max-w-md p-8 fade-in">
          <div className="flex flex-col items-center text-center">
            <div className="w-20 h-20 rounded-full bg-gold-500/15 flex items-center justify-center mb-5">
              <Icon name="shield" size={36} className="text-gold-400"/>
            </div>
            <h2 className="text-xl font-bold text-gold-400 mb-3">{t.auth.pendingTitle}</h2>
            <p className="text-gray-400 text-sm leading-relaxed mb-6">{t.auth.pendingMessage}</p>
            <div className="w-full bg-dark-900 rounded-lg p-4 mb-6">
              <div className="flex items-center justify-between text-sm">
                <span className="text-gray-500">{t.common.name}:</span>
                <span className="text-white font-medium">{pendingUser?.firstName} {pendingUser?.lastName}</span>
              </div>
              <div className="flex items-center justify-between text-sm mt-2">
                <span className="text-gray-500">{t.auth.regMethod}:</span>
                <span className="badge badge-blue">{pendingUser?.registrationMethod === 'google' ? t.auth.regGoogle : pendingUser?.registrationMethod === 'email' ? t.auth.regEmail : t.auth.regPhone}</span>
              </div>
              <div className="flex items-center justify-between text-sm mt-2">
                <span className="text-gray-500">{t.common.status}:</span>
                <span className="badge badge-yellow">{t.auth.statusPending}</span>
              </div>
            </div>
            <Btn variant="ghost" onClick={resetToLogin} className="w-full">
              <Icon name="logout" size={16}/>{t.auth.backToLogin}
            </Btn>
          </div>
        </div>
      </div>
    );
  }

  // REJECTED screen
  if (mode === 'rejected') {
    return (
      <div className="auth-bg flex items-center justify-center p-4">
        <LangDropdown/>
        <div className="auth-card w-full max-w-md p-8 fade-in">
          <div className="flex flex-col items-center text-center">
            <div className="w-20 h-20 rounded-full bg-red-900/30 flex items-center justify-center mb-5">
              <Icon name="x" size={36} className="text-red-400"/>
            </div>
            <h2 className="text-xl font-bold text-red-400 mb-3">{t.auth.rejectedTitle}</h2>
            <p className="text-gray-400 text-sm leading-relaxed mb-6">{t.auth.rejectedMessage}</p>
            <Btn variant="ghost" onClick={resetToLogin} className="w-full">
              <Icon name="logout" size={16}/>{t.auth.backToLogin}
            </Btn>
          </div>

const ProfileModal = ({ isOpen, onClose, t, currentUser, data, updateData, setCurrentUser }) => {
  const [tab, setTab] = useState('profile');
  const [form, setForm] = useState({});
  const [pwForm, setPwForm] = useState({ oldPassword:'', newPassword:'', confirmPassword:'' });
  const [msg, setMsg] = useState('');
  const [err, setErr] = useState('');
  const fileInputRef = useRef(null);

  useEffect(() => {
    if (currentUser) {
      setForm({ firstName: currentUser.firstName, lastName: currentUser.lastName, email: currentUser.email||'', phone: currentUser.phone||'' });
    }
  }, [currentUser, isOpen]);

  const handlePhotoUpload = (e) => {
    const file = e.target.files?.[0];
    if (!file) return;
    if (file.size > 2 * 1024 * 1024) { setErr('Max 2MB'); return; }
    const reader = new FileReader();
    reader.onload = async () => {
      const avatar = reader.result;
      try {
        const updatedUser = await api.put('/auth/me', { avatar });
        setCurrentUser(updatedUser);
        storage.set('church_session', updatedUser);
        setMsg(t.auth.profileUpdated);
      } catch (e) { setErr('Failed to save photo'); }
    };
    reader.readAsDataURL(file);
  };

  const removePhoto = async () => {
    try {
      const updatedUser = await api.put('/auth/me', { avatar: null });
      setCurrentUser(updatedUser);
      storage.set('church_session', updatedUser);
    } catch (e) { setErr('Failed to remove photo'); }
  };

  const handleSaveProfile = async () => {
    setMsg(''); setErr('');
    if (!form.firstName || !form.lastName) { setErr(t.auth.fillRequired); return; }
    try {
      const updatedUser = await api.put('/auth/me', {
        firstName: form.firstName, lastName: form.lastName,
        email: form.email || undefined, phone: form.phone || undefined,
      });
      setCurrentUser(updatedUser);
      storage.set('church_session', updatedUser);
      setMsg(t.auth.profileUpdated);
    } catch (e) {
      setErr(e.error || 'Failed to save profile');
    }
  };

  const handleChangePw = async () => {
    setMsg(''); setErr('');
    if (!pwForm.oldPassword || !pwForm.newPassword) { setErr(t.auth.fillRequired); return; }
    if (pwForm.newPassword !== pwForm.confirmPassword) { setErr(t.auth.passwordMismatch); return; }
    try {
      await api.put('/auth/password', { currentPassword: pwForm.oldPassword, newPassword: pwForm.newPassword });
      setPwForm({ oldPassword:'', newPassword:'', confirmPassword:'' });
      setMsg(t.auth.passwordChanged);
    } catch (err) {
      setErr(err.error || t.auth.invalidCredentials);
    }
  };

  if (!isOpen) return null;

  return (
    <Modal isOpen={isOpen} onClose={onClose} title={t.auth.myProfile} maxWidth="max-w-md">
      <div className="flex flex-col items-center mb-5">
        <div className="relative mb-2">
          <UserAvatar user={currentUser} size={64}/>
          <button onClick={()=>fileInputRef.current?.click()}
            className="absolute -bottom-1 -right-1 w-7 h-7 rounded-full bg-gold-500 flex items-center justify-center text-dark-900 hover:bg-gold-400 transition-colors shadow-lg">
            <Icon name="camera" size={14}/>
          </button>
          <input ref={fileInputRef} type="file" accept="image/*" className="hidden" onChange={handlePhotoUpload}/>
        </div>
        {currentUser?.avatar && <button onClick={removePhoto} className="text-xs text-red-400 hover:underline mb-1">{t.common.removePhoto}</button>}
        <div className="text-lg font-bold text-white">{currentUser?.firstName} {currentUser?.lastName}</div>
        <span className={`badge mt-1 ${getRoleBadgeClass(currentUser?.role)}`}>
          {getRoleLabel(currentUser?.role, t)}
        </span>
      </div>

      <div className="flex gap-1 bg-dark-900 rounded-lg p-1 mb-4">
        <button onClick={()=>{setTab('profile');setMsg('');setErr('');}} className={`flex-1 py-1.5 rounded-md text-xs font-medium transition-colors ${tab==='profile'?'bg-dark-700 text-gold-400':'text-gray-500'}`}>
          {t.auth.profile}
        </button>
        <button onClick={()=>{setTab('password');setMsg('');setErr('');}} className={`flex-1 py-1.5 rounded-md text-xs font-medium transition-colors ${tab==='password'?'bg-dark-700 text-gold-400':'text-gray-500'}`}>
          {t.auth.changePassword}
        </button>
      </div>

      {msg && <div className="bg-green-900/30 text-green-400 text-sm rounded-lg px-3 py-2 mb-3">{msg}</div>}
      {err && <div className="bg-red-900/30 text-red-400 text-sm rounded-lg px-3 py-2 mb-3">{err}</div>}

      {tab === 'profile' ? (
        <div className="space-y-3">
          <div className="grid grid-cols-2 gap-3">
            <Input label={t.auth.firstName} value={form.firstName||''} onChange={v=>setForm(f=>({...f,firstName:v}))} required/>
            <Input label={t.auth.lastName} value={form.lastName||''} onChange={v=>setForm(f=>({...f,lastName:v}))} required/>
          </div>
          <Input label={t.auth.email} type="email" value={form.email||''} onChange={v=>setForm(f=>({...f,email:v}))} icon={<Icon name="mail" size={16}/>}/>
          <Input label={t.auth.phone} value={form.phone||''} onChange={v=>setForm(f=>({...f,phone:v}))} icon={<Icon name="phone" size={16}/>}/>
          <Btn variant="gold" onClick={handleSaveProfile} className="w-full"><Icon name="save" size={15}/>{t.common.save}</Btn>
        </div>
      ) : (
        <div className="space-y-3">
          <Input label={t.auth.oldPassword} type="password" value={pwForm.oldPassword} onChange={v=>setPwForm(f=>({...f,oldPassword:v}))} required icon={<Icon name="lock" size={16}/>}/>
          <Input label={t.auth.newPassword} type="password" value={pwForm.newPassword} onChange={v=>setPwForm(f=>({...f,newPassword:v}))} required icon={<Icon name="key" size={16}/>}/>
          <Input label={t.auth.confirmPassword} type="password" value={pwForm.confirmPassword} onChange={v=>setPwForm(f=>({...f,confirmPassword:v}))} required icon={<Icon name="key" size={16}/>}/>
          <Btn variant="gold" onClick={handleChangePw} className="w-full"><Icon name="key" size={15}/>{t.auth.changePassword}</Btn>
        </div>
      )}
    </Modal>
  );
};

const Sidebar = ({ page, setPage, t, lang, setLang, collapsed, setCollapsed, currentUser, canAccessPage }) => {
  const [langOpen, setLangOpen] = useState(false);
  const langRef = useRef(null);

  useEffect(() => {
    const handleClick = (e) => { if (langRef.current && !langRef.current.contains(e.target)) setLangOpen(false); };
    document.addEventListener('mousedown', handleClick);
    return () => document.removeEventListener('mousedown', handleClick);
  }, []);

  const sections = [
    { label: 'Management', items: [
      { id:'dashboard', icon:'dashboard', label:t.nav.dashboard },
      { id:'members', icon:'users', label:t.nav.members },
      { id:'attendance', icon:'attendance', label:t.nav.attendance },
      { id:'events', icon:'calendar', label:t.nav.events },
      { id:'finance', icon:'wallet', label:t.nav.finance },
      { id:'groups', icon:'groups', label:t.nav.groups },
      { id:'accounts', icon:'shield', label:t.auth.accounts },
    ]},
    { label: 'Social', items: [
      { id:'feed', icon:'list', label:t.social.feed },
      { id:'spaces', icon:'video', label:t.social.spaces, liveDot:true },
      { id:'ranking', icon:'trending_up', label:t.social.ranking },
    ]},
    { label: 'Community', items: [
      { id:'community', icon:'dashboard', label:t.community?.hub||'Community Hub', emoji:'🏠' },
      { id:'magazine', icon:'book', label:t.community?.magazine||'Magazine', emoji:'📰' },
      { id:'prayer_wall', icon:'heart', label:t.community?.prayerWall||'Prayer Wall', emoji:'🙏' },
      { id:'announcements_page', icon:'bell', label:t.community?.announcements||'Announcements', emoji:'📣' },
      { id:'pastor_word', icon:'star', label:t.community?.pastorWord||"Pastor's Word", emoji:'✝' },
      { id:'fundraising_page', icon:'heart', label:t.community?.fundraising||'Fundraising', emoji:'💝' },
    ]},
  ];

  const check = canAccessPage || (() => true);
  const filteredSections = sections.map(s => ({
    ...s,
    items: s.items.filter(item => check(item.id))
  })).filter(s => s.items.length > 0);

  const langs = [
    { code:'en', flag:'🇺🇸', name:'English' },
    { code:'es', flag:'🇪🇸', name:'Español' },
    { code:'fr', flag:'🇫🇷', name:'Français' },
    { code:'ht', flag:'🇭🇹', name:'Kreyol' },
  ];
  const currentLang = langs.find(l=>l.code===lang) || langs[0];

  return (
    <div className={`sidebar flex flex-col h-full transition-all duration-300 ${collapsed?'w-16':'w-64'} flex-shrink-0`}>
      <div className="flex items-center gap-3 px-3 py-4 border-b border-dark-700">
        <div className="flex-shrink-0">
          <ChurchLogo size={collapsed?32:36}/>
        </div>
        {!collapsed && <div className="min-w-0">
          <div className="text-gold-400 font-bold text-sm leading-tight truncate">{t.appName}</div>
          <div className="text-gray-500 text-[10px] truncate">{t.subtitle}</div>
        </div>}
        <button onClick={()=>setCollapsed(!collapsed)} className="ml-auto text-gray-500 hover:text-gold-400 p-1 flex-shrink-0">
          <Icon name="menu" size={16}/>
        </button>
      </div>

      <nav className="flex-1 py-1 overflow-y-auto">
        {filteredSections.map((section, si) => (
          <div key={section.label}>
            {!collapsed && si > 0 && (
              <div className="px-4 pt-4 pb-1">
                <span className="text-[10px] text-gray-600 uppercase tracking-wider font-semibold">{section.label}</span>
              </div>
            )}
            {collapsed && si > 0 && <div className="border-t border-dark-700 my-1 mx-3"/>}
            {section.items.map(item=>(
              <button key={item.id} onClick={()=>setPage(item.id)}
                className={`nav-item w-full flex items-center gap-3 px-4 py-2 text-sm text-gray-400 hover:text-gold-400 ${page===item.id?'active text-gold-400':''}`}>
                {item.emoji && !collapsed ? (
                  <span className="flex-shrink-0 text-sm w-[18px] text-center">{item.emoji}</span>
                ) : (
                  <Icon name={item.icon} size={18} className="flex-shrink-0"/>
                )}
                {!collapsed && <span className="flex-1 text-left">{item.label}</span>}
                {item.liveDot && !collapsed && <span className="w-2 h-2 rounded-full bg-red-500 animate-pulse"/>}
              </button>
            ))}
          </div>
        ))}
      </nav>

      {/* Language Dropdown */}
      <div className="px-3 py-3 border-t border-dark-700 relative" ref={langRef}>
        <button onClick={()=>setLangOpen(!langOpen)}
          className={`w-full flex items-center gap-2 px-2.5 py-2 rounded-lg transition-colors hover:bg-dark-700 ${langOpen?'bg-dark-700':''}`}>
          <span className="text-base flex-shrink-0">{currentLang.flag}</span>
          {!collapsed && <>
            <span className="text-sm text-gray-300 flex-1 text-left">{currentLang.name}</span>
            <Icon name="chevron_down" size={14} className={`text-gray-500 transition-transform ${langOpen?'rotate-180':''}`}/>
          </>}
        </button>
        {langOpen && (
          <div className={`absolute ${collapsed?'left-full ml-2':'left-3 right-3'} bottom-full mb-1 bg-dark-800 border border-dark-600 rounded-xl shadow-xl overflow-hidden fade-in z-50`}
            style={collapsed?{minWidth:'160px'}:{}}>
            <div className="px-3 py-2 border-b border-dark-700">
              <span className="text-[10px] text-gray-500 uppercase tracking-wider font-semibold">Language</span>
            </div>
            {langs.map(l=>(
              <button key={l.code} onClick={()=>{setLang(l.code);setLangOpen(false);}}
                className={`w-full flex items-center gap-2.5 px-3 py-2.5 text-sm transition-colors ${lang===l.code?'bg-gold-500/15 text-gold-400':'text-gray-400 hover:bg-dark-700 hover:text-white'}`}>
                <span className="text-base">{l.flag}</span>
                <span className="flex-1 text-left">{l.name}</span>
                {lang===l.code && <Icon name="check" size={14} className="text-gold-400"/>}
              </button>
            ))}
          </div>
        )}
      </div>
    </div>
  );
};

const AdminDashboard = ({ data, t, currentUser }) => {
  const now = new Date();
  const monthStr = `${now.getFullYear()}-${String(now.getMonth()+1).padStart(2,'0')}`;

  const totalMembers = data.members.filter(m=>m.status==='active').length;
  const monthFinance = data.finance.filter(f=>f.date.startsWith(monthStr));
  const monthIncome = monthFinance.filter(f=>f.type!=='expense').reduce((s,f)=>s+Number(f.amount),0);
  const upcomingEvents = data.events.filter(e=>e.date>=today).length;

  const thisMonthAttendance = data.attendance.filter(a=>a.date.startsWith(monthStr));
  const avgAttendance = thisMonthAttendance.length>0
    ? Math.round(thisMonthAttendance.reduce((s,a)=>s+a.attendeeIds.length,0)/thisMonthAttendance.length) : 0;
  const attendRate = totalMembers > 0 ? Math.round((avgAttendance/totalMembers)*100) : 0;

  const recentMembers = [...data.members].sort((a,b)=>new Date(b.joinDate)-new Date(a.joinDate)).slice(0,5);
  const recentTransactions = [...data.finance].sort((a,b)=>new Date(b.date)-new Date(a.date)).slice(0,5);

            <div className="text-3xl font-bold text-white mb-1">{s.value}</div>

      <div className="grid grid-cols-1 lg:grid-cols-2 gap-6">
        <div className="card p-5">
          <h3 className="font-bold text-gold-400 mb-4">{t.dash.recentMembers}</h3>

const Members = ({ data, updateData, t }) => {
  const [search, setSearch] = useState('');
  const [statusFilter, setStatusFilter] = useState('all');
  const [modal, setModal] = useState(null);
  const [confirm, setConfirm] = useState(null);
  const [form, setForm] = useState({});

  const exportMembersCSV = () => {
    const headers = ['First Name','Last Name','Email','Phone','Address','Birth Date','Status','Join Date','Gender'];
    const rows = (data.members||[]).map(m => [m.firstName,m.lastName,m.email||'',m.phone||'',m.address||'',m.birthDate||'',m.status||'',m.joinDate||'',m.gender||'']);
    const csv = [headers,...rows].map(r=>r.map(c=>`"${String(c).replace(/"/g,'""')}"`).join(',')).join('\n');
    const blob = new Blob([csv],{type:'text/csv'}); const url = URL.createObjectURL(blob);
    const a = document.createElement('a'); a.href=url; a.download=`members_${today}.csv`; a.click(); URL.revokeObjectURL(url);
  };

  const filtered = useMemo(() => {
    return data.members.filter(m => {
      const matchSearch = search==='' || `${m.firstName} ${m.lastName} ${m.email} ${m.phone}`.toLowerCase().includes(search.toLowerCase());
      const matchStatus = statusFilter==='all' || m.status===statusFilter;
      return matchSearch && matchStatus;
    });
  }, [data.members, search, statusFilter]);

  const openAdd = () => {
    setForm({ firstName:'', lastName:'', email:'', phone:'', address:'', joinDate:today, birthDate:'', status:'active', groupId:'', gender:'male' });
    setModal('add');
  };

  const openEdit = (m) => {
    setForm({ ...m, groupId: m.groupId||'' });
    setModal('edit');
  };

  const handleSave = () => {
    if (!form.firstName?.trim() || !form.lastName?.trim()) return;
    if (modal==='add') {
      updateData('members', [...data.members, { ...form, id: Date.now(), groupId: form.groupId||null }]);
    } else {
      updateData('members', data.members.map(m=>m.id===form.id?{...form, groupId:form.groupId||null}:m));
    }
    setModal(null);
  };

  const handleDelete = (id) => {
    updateData('members', data.members.filter(m=>m.id!==id));
    setConfirm(null);
  };

  const groupOpts = [{ value:'', label:t.common.select },...data.groups.map(g=>({ value:g.id, label:g.name }))];
  const statusOpts = [
    { value:'all', label:t.common.all },
    { value:'active', label:t.members.active },
    { value:'inactive', label:t.members.inactive },
    { value:'visitor', label:t.members.visitor },
  ];

  const statusBadge = (s) => s==='active'?'badge-green':s==='visitor'?'badge-yellow':'badge-gray';
  const statusLabel = (s) => s==='active'?t.members.active:s==='visitor'?t.members.visitor:t.members.inactive;

  return (
    <div className="space-y-4 fade-in">
      <div className="card p-4 flex flex-wrap gap-3 items-center justify-between">
        <div className="flex gap-3 flex-1 min-w-0">
          <div className="relative flex-1 max-w-sm">
            <Icon name="search" size={16} className="absolute left-3 top-1/2 -translate-y-1/2 text-gray-500"/>
            <input value={search} onChange={e=>setSearch(e.target.value)} placeholder={t.members.search}
              className="w-full border border-dark-500 rounded-lg pl-9 pr-3 py-2 text-sm" />
          </div>
          <select value={statusFilter} onChange={e=>setStatusFilter(e.target.value)}
            className="border border-dark-500 rounded-lg px-3 py-2 text-sm">
            {statusOpts.map(o=><option key={o.value} value={o.value}>{o.label}</option>)}

          <Btn variant="ghost" onClick={exportMembersCSV}><Icon name="download" size={14}/>{t.common.exportCSV}</Btn>

        </div>
      </div>

      <div className="card overflow-hidden">

                    <th className="text-left px-4 py-3 font-medium hidden sm:table-cell">{t.members.phone}</th>

                    <th className="text-right px-4 py-3 font-medium">{t.members.actions}</th>
                  </tr>

          <Input label={t.members.phone} value={form.phone||''} onChange={v=>setForm(f=>({...f,phone:v}))}/>
          <Input label={t.members.address} value={form.address||''} onChange={v=>setForm(f=>({...f,address:v}))}/>
          <div className="grid grid-cols-2 gap-3">
            <Input label={t.members.joinDate} type="date" value={form.joinDate||''} onChange={v=>setForm(f=>({...f,joinDate:v}))}/>
            <Input label={t.members.birthDate} type="date" value={form.birthDate||''} onChange={v=>setForm(f=>({...f,birthDate:v}))}/>
          </div>
          <div className="grid grid-cols-2 gap-3">
            <Select label={t.members.status} value={form.status||'active'} onChange={v=>setForm(f=>({...f,status:v}))}
              options={[{value:'active',label:t.members.active},{value:'inactive',label:t.members.inactive},{value:'visitor',label:t.members.visitor}]}/>
            <Select label={t.members.group} value={form.groupId||''} onChange={v=>setForm(f=>({...f,groupId:v?Number(v):''}))} options={groupOpts}/>

          <Btn variant="ghost" onClick={()=>setModal(null)}>{t.common.cancel}</Btn>

      <ConfirmModal isOpen={!!confirm} message={t.members.confirmDelete} onConfirm={()=>handleDelete(confirm)} onCancel={()=>setConfirm(null)} t={t}/>
    </div>
  );
};

const Attendance = ({ data, updateData, t }) => {
  const [selDate, setSelDate] = useState(today);
  const [selService, setSelService] = useState('sun_am');
  const [checked, setChecked] = useState({});
  const [saved, setSaved] = useState(false);

  const serviceTypes = [
    { value:'sun_am', label:t.attend.sun_am }, { value:'sun_pm', label:t.attend.sun_pm },
    { value:'wed', label:t.attend.wed }, { value:'prayer', label:t.attend.prayer },
    { value:'youth', label:t.attend.youth }, { value:'special', label:t.attend.special },
  ];

  const activeMembers = data.members.filter(m=>m.status==='active');
  const presentCount = Object.values(checked).filter(Boolean).length;

  const handleSave = () => {
    const attendeeIds = activeMembers.filter(m=>checked[m.id]).map(m=>m.id);
    const existing = data.attendance.find(a=>a.date===selDate && a.serviceType===selService);
    if (existing) {
      updateData('attendance', data.attendance.map(a=> a.id===existing.id ? {...a, attendeeIds} : a));
    } else {
      updateData('attendance', [...data.attendance, { id:Date.now(), date:selDate, serviceType:selService, attendeeIds }]);
    }
    setSaved(true);
    setTimeout(()=>setSaved(false), 3000);
  };

  useEffect(() => {
    const existing = data.attendance.find(a=>a.date===selDate && a.serviceType===selService);
    if (existing) {
      const map = {};
      activeMembers.forEach(m=>{ map[m.id] = existing.attendeeIds.includes(m.id); });
      setChecked(map);
    } else {
      setChecked({});
    }
  }, [selDate, selService, data.attendance]);

  const toggle = (id) => setChecked(c=>({...c,[id]:!c[id]}));
  const markAll = () => { const m={}; activeMembers.forEach(mb=>{m[mb.id]=true;}); setChecked(m); };
  const clearAll = () => setChecked({});

  const history = [...data.attendance].sort((a,b)=>new Date(b.date)-new Date(a.date)).slice(0,8);

  const exportAttendCSV = () => {
    const headers = ['Date','Service Type','Total Members','Present','Absent','Rate (%)'];
    const rows = data.attendance.map(a => {
      const total = activeMembers.length;
      const present = a.attendeeIds?.length||0;
      return [a.date, a.serviceType, total, present, total-present, total>0?Math.round((present/total)*100):0];
    });
    const csv = [headers,...rows].map(r=>r.map(c=>`"${String(c).replace(/"/g,'""')}"`).join(',')).join('\n');
    const blob = new Blob([csv],{type:'text/csv'}); const url = URL.createObjectURL(blob);
    const a = document.createElement('a'); a.href=url; a.download=`attendance_${today}.csv`; a.click(); URL.revokeObjectURL(url);
  };

  return (
    <div className="space-y-4 fade-in">
      <div className="card p-5">
        <div className="flex flex-wrap gap-4 items-end">
          <Input label={t.attend.date} type="date" value={selDate} onChange={setSelDate} className="flex-1 min-w-40"/>
          <Select label={t.attend.serviceType} value={selService} onChange={setSelService} options={serviceTypes} className="flex-1 min-w-48"/>
          <div className="flex gap-2">
            <Btn variant="ghost" size="sm" onClick={exportAttendCSV}><Icon name="download" size={14}/>{t.common.exportCSV}</Btn>
            <Btn variant="ghost" size="sm" onClick={markAll}><Icon name="check" size={14}/>{t.attend.markAll}</Btn>
            <Btn variant="ghost" size="sm" onClick={clearAll}><Icon name="x" size={14}/>{t.attend.clearAll}</Btn>
          </div>
        </div>
        <div className="mt-4 flex items-center gap-4">
          <div className="flex items-center gap-2 bg-green-900/30 text-green-400 px-3 py-1.5 rounded-lg text-sm font-medium">
            <Icon name="check" size={14}/>{t.attend.totalPresent}: <strong>{presentCount}</strong>
          </div>
          <div className="flex items-center gap-2 bg-red-900/30 text-red-400 px-3 py-1.5 rounded-lg text-sm font-medium">
            <Icon name="x" size={14}/>{t.attend.totalAbsent}: <strong>{activeMembers.length - presentCount}</strong>
          </div>
          <div className="progress-bar flex-1">
            <div className="progress-fill bg-gold-500" style={{width:`${activeMembers.length>0?(presentCount/activeMembers.length)*100:0}%`}}></div>
          </div>
          <span className="text-sm text-gray-400 font-medium">{activeMembers.length>0?Math.round((presentCount/activeMembers.length)*100):0}%</span>
        </div>
      </div>

      <div className="card overflow-hidden">
        <div className="px-5 py-3 border-b border-dark-700">
          <h3 className="font-semibold text-gold-400">{activeMembers.length} {t.common.total}</h3>
        </div>
        {activeMembers.length === 0
          ? <EmptyState icon="users" message={t.common.noData}/>
          : <div className="divide-y divide-dark-700">
              {activeMembers.map(m=>{
                const group = data.groups.find(g=>g.id===m.groupId);
                return (
                  <div key={m.id} onClick={()=>toggle(m.id)}
                    className={`flex items-center gap-3 px-5 py-3 cursor-pointer transition-colors ${checked[m.id]?'bg-green-900/20':'hover:bg-dark-700'}`}>
                    <div className={`w-6 h-6 rounded-lg border-2 flex items-center justify-center flex-shrink-0 transition-colors ${checked[m.id]?'bg-gold-500 border-gold-500':'border-dark-500'}`}>
                      {checked[m.id] && <Icon name="check" size={13} className="text-dark-900"/>}
                    </div>
                    <div className="w-9 h-9 rounded-full bg-gradient-to-br from-gold-500 to-gold-700 flex items-center justify-center text-dark-900 text-xs font-bold flex-shrink-0">
                      {m.firstName[0]}{m.lastName[0]}
                    </div>
                    <div className="flex-1">
                      <div className="font-semibold text-white text-sm">{m.firstName} {m.lastName}</div>
                      {group && <div className="text-xs text-gray-500">{group.name}</div>}
                    </div>
                    <span className={`text-sm font-medium ${checked[m.id]?'text-green-400':'text-gray-600'}`}>
                      {checked[m.id]?t.attend.present:t.attend.absent}
                    </span>
                  </div>
                );
              })}
            </div>
        }
      </div>

      <div className="flex items-center gap-4">
        <Btn variant={saved?"success":"gold"} onClick={handleSave} size="lg">
          <Icon name={saved?"check":"save"} size={18}/>{saved ? t.attend.saved : t.attend.save}
        </Btn>
      </div>

      {history.length > 0 && (
        <div className="card p-5">
          <h3 className="font-bold text-gold-400 mb-4">{t.attend.history}</h3>
          <div className="overflow-x-auto">
            <table className="w-full text-sm">
              <thead className="text-gray-500">
                <tr className="border-b border-dark-700">
                  <th className="text-left pb-2 font-medium">{t.attend.date}</th>
                  <th className="text-left pb-2 font-medium">{t.attend.serviceType}</th>
                  <th className="text-left pb-2 font-medium">{t.attend.totalPresent}</th>
                  <th className="text-left pb-2 font-medium">%</th>
                </tr>
              </thead>
              <tbody className="divide-y divide-dark-700">
                {history.map(a=>{
                  const svc = serviceTypes.find(s=>s.value===a.serviceType);
                  const total = data.members.filter(m=>m.status==='active').length;
                  const rate = total>0?Math.round((a.attendeeIds.length/total)*100):0;
                  return (
                    <tr key={a.id}>
                      <td className="py-2 text-gray-300">{formatDate(a.date)}</td>
                      <td className="py-2 text-gray-400">{svc?svc.label:a.serviceType}</td>
                      <td className="py-2 font-semibold text-white">{a.attendeeIds.length} / {total}</td>
                      <td className="py-2"><span className={`badge ${rate>=75?'badge-green':rate>=50?'badge-yellow':'badge-red'}`}>{rate}%</span></td>
                    </tr>
                  );
                })}
              </tbody>
            </table>
          </div>
        </div>
      )}
    </div>
  );
};

const Events = ({ data, updateData, t, currentUser }) => {
  const [modal, setModal] = useState(null);
  const [confirm, setConfirm] = useState(null);
  const [form, setForm] = useState({});
  const [tab, setTab] = useState('upcoming');
  const [rsvpModal, setRsvpModal] = useState(null);
  const [rsvpForm, setRsvpForm] = useState({ attending: true, reason: '' });
  const [rsvpViewEvent, setRsvpViewEvent] = useState(null);
  const [rsvpMsg, setRsvpMsg] = useState('');
  const isAdmin = ['superadmin','admin'].includes(currentUser?.role);

  const upcoming = data.events.filter(e=>e.date>=today).sort((a,b)=>a.date.localeCompare(b.date));
  const past = data.events.filter(e=>e.date<today).sort((a,b)=>b.date.localeCompare(a.date));
  const shown = tab==='upcoming'?upcoming:past;

  const rsvps = data.eventRsvps || [];
  const getRsvpForEvent = (eventId) => rsvps.filter(r => r.eventId === eventId);
  const getMyRsvp = (eventId) => rsvps.find(r => r.eventId === eventId && r.userId === currentUser?.id);

  const typeColors = { worship:'badge-blue', meeting:'badge-purple', outreach:'badge-green', special:'badge-yellow', youth:'badge-red', prayer:'badge-gray' };
  const typeLabel = (type) => {
    const m = { worship:t.events.worship, meeting:t.events.meeting, outreach:t.events.outreach, special:t.events.special, youth:t.events.youth };
    return m[type]||type;
  };

  const openAdd = () => {
    setForm({ title:'', date:today, time:'10:00', location:'', description:'', type:'worship' });
    setModal('add');
  };

  const handleSave = () => {
    if (!form.title?.trim() || !form.date) return;
    if (modal==='add') {
      updateData('events', [...data.events, {...form, id:Date.now()}]);
    } else {
      updateData('events', data.events.map(e=>e.id===form.id?form:e));
    }
    setModal(null);
  };

  const handleRsvp = () => {
    const existing = rsvps.filter(r => !(r.eventId === rsvpModal && r.userId === currentUser?.id));
    const newRsvp = { id: Date.now(), eventId: rsvpModal, userId: currentUser?.id, userName: `${currentUser?.firstName} ${currentUser?.lastName}`, attending: rsvpForm.attending, reason: rsvpForm.reason, createdAt: new Date().toISOString() };
    updateData('eventRsvps', [...existing, newRsvp]);
    setRsvpMsg(t.events.rsvpSubmitted);
    setTimeout(() => { setRsvpModal(null); setRsvpMsg(''); }, 1200);
  };

  const exportEventsCSV = () => {
    const headers = ['Title','Date','Time','Location','Type','Description','Attending','Declined'];
    const rows = shown.map(e => {
      const er = getRsvpForEvent(e.id);
      return [e.title, e.date, e.time||'', e.location||'', e.type, e.description||'', er.filter(r=>r.attending).length, er.filter(r=>!r.attending).length];
    });
    const csv = [headers, ...rows].map(r => r.map(c => `"${String(c).replace(/"/g,'""')}"`).join(',')).join('\n');
    const blob = new Blob([csv], { type: 'text/csv' });
    const url = URL.createObjectURL(blob);
    const a = document.createElement('a'); a.href = url; a.download = `events_${today}.csv`; a.click(); URL.revokeObjectURL(url);
  };

  const typeOpts = [
    {value:'worship',label:t.events.worship},{value:'meeting',label:t.events.meeting},
    {value:'outreach',label:t.events.outreach},{value:'special',label:t.events.special},
    {value:'youth',label:t.events.youth},{value:'prayer',label:t.attend.prayer},
  ];

  const eventIcons = { worship:'🕊️', meeting:'📋', outreach:'🤝', special:'⭐', youth:'🎯', prayer:'🙏' };

  return (
    <div className="space-y-4 fade-in">
      <div className="card p-4 flex items-center justify-between flex-wrap gap-2">
        <div className="flex gap-1 bg-dark-900 rounded-lg p-1">
          <button onClick={()=>setTab('upcoming')} className={`px-4 py-1.5 rounded-lg text-sm font-medium transition-colors ${tab==='upcoming'?'bg-dark-700 text-gold-400':'text-gray-500'}`}>
            {t.events.upcoming} ({upcoming.length})
          </button>
          <button onClick={()=>setTab('past')} className={`px-4 py-1.5 rounded-lg text-sm font-medium transition-colors ${tab==='past'?'bg-dark-700 text-gold-400':'text-gray-500'}`}>
            {t.events.past} ({past.length})
          </button>
        </div>
        <div className="flex gap-2">
          <Btn variant="ghost" onClick={exportEventsCSV}><Icon name="download" size={14}/>{t.common.exportCSV}</Btn>
          {isAdmin && <Btn variant="primary" onClick={openAdd}><Icon name="plus" size={16}/>{t.events.add}</Btn>}
        </div>
      </div>

      {shown.length === 0
        ? <div className="card"><EmptyState icon="calendar" message={t.events.noEvents}/></div>
        : <div className="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-4">
            {shown.map(e=>{
              const er = getRsvpForEvent(e.id);
              const myRsvp = getMyRsvp(e.id);
              const attendCount = er.filter(r=>r.attending).length;
              const declineCount = er.filter(r=>!r.attending).length;
              return (
              <div key={e.id} className="card p-4 hover:shadow-lg transition-shadow border border-dark-700">
                <div className="flex items-start justify-between mb-3">
                  <span className="text-2xl">{eventIcons[e.type]||'📅'}</span>
                  <span className={`badge ${typeColors[e.type]||'badge-gray'}`}>{typeLabel(e.type)}</span>
                </div>
                <h4 className="font-bold text-white mb-1">{e.title}</h4>
                {e.description && <p className="text-sm text-gray-500 mb-3 line-clamp-2">{e.description}</p>}
                <div className="space-y-1.5 text-sm text-gray-400">
                  <div className="flex items-center gap-2"><Icon name="calendar" size={13} className="text-gray-500"/>{formatDate(e.date)}</div>
                  {e.time && <div className="flex items-center gap-2"><span className="text-gray-500 text-xs">🕐</span>{e.time}</div>}
                  {e.location && <div className="flex items-center gap-2"><span className="text-gray-500 text-xs">📍</span>{e.location}</div>}
                </div>
                {/* RSVP Summary */}
                <div className="flex items-center gap-3 mt-3 text-xs">
                  <span className="text-green-400">✓ {attendCount} {t.events.attending}</span>
                  <span className="text-red-400">✗ {declineCount} {t.events.notAttending}</span>
                  {isAdmin && er.length > 0 && <button onClick={()=>setRsvpViewEvent(e.id)} className="text-gold-400 hover:underline ml-auto">{t.common.actions}</button>}
                </div>
                {/* My RSVP status */}
                {myRsvp && <div className="mt-2 text-xs">
                  <span className={`badge ${myRsvp.attending?'badge-green':'badge-red'}`}>
                    {t.events.rsvpYourStatus}: {myRsvp.attending ? t.events.attending : t.events.notAttending}
                  </span>
                </div>}
                <div className="flex gap-2 mt-4 pt-3 border-t border-dark-700">
                  {e.date >= today && <button onClick={()=>{setRsvpForm({ attending: true, reason: '' }); setRsvpModal(e.id); setRsvpMsg('');}} className="flex-1 text-center text-sm text-blue-400 hover:text-blue-300 font-medium py-1">
                    {myRsvp ? t.events.rsvpChange : t.community.rsvp}
                  </button>}
                  {isAdmin && <>
                    <button onClick={()=>{setForm({...e});setModal('edit');}} className="flex-1 text-center text-sm text-gold-400 hover:text-gold-500 font-medium py-1">{t.common.edit}</button>
                    <button onClick={()=>setConfirm(e.id)} className="flex-1 text-center text-sm text-red-400 hover:text-red-500 font-medium py-1">{t.common.delete}</button>
                  </>}
                </div>
              </div>
            );})}
          </div>
      }

      {/* RSVP Modal */}
      <Modal isOpen={!!rsvpModal} onClose={()=>setRsvpModal(null)} title={t.community.rsvp} maxWidth="max-w-sm">
        {rsvpMsg ? <div className="bg-green-900/30 text-green-400 text-sm rounded-lg px-4 py-3 text-center">{rsvpMsg}</div> : <>
          <div className="flex gap-2 mb-4">
            <button onClick={()=>setRsvpForm(f=>({...f, attending:true}))}
              className={`flex-1 py-3 rounded-lg text-sm font-bold transition-all border-2 ${rsvpForm.attending ? 'border-green-500 bg-green-900/30 text-green-400' : 'border-dark-600 text-gray-500'}`}>
              ✓ {t.events.rsvpAttending}
            </button>
            <button onClick={()=>setRsvpForm(f=>({...f, attending:false}))}
              className={`flex-1 py-3 rounded-lg text-sm font-bold transition-all border-2 ${!rsvpForm.attending ? 'border-red-500 bg-red-900/30 text-red-400' : 'border-dark-600 text-gray-500'}`}>
              ✗ {t.events.rsvpNotAttending}
            </button>
          </div>
          {!rsvpForm.attending && <Textarea label={t.events.rsvpReason} value={rsvpForm.reason} onChange={v=>setRsvpForm(f=>({...f,reason:v}))} rows={2} className="mb-3"/>}
          <Btn variant="gold" onClick={handleRsvp} className="w-full">{t.common.confirm}</Btn>
        </>}
      </Modal>

      {/* RSVP View Modal (admin) */}
      <Modal isOpen={!!rsvpViewEvent} onClose={()=>setRsvpViewEvent(null)} title={`${t.events.rsvpAttendees} / ${t.events.rsvpDeclined}`}>
        {rsvpViewEvent && (() => {
          const er = getRsvpForEvent(rsvpViewEvent);
          const att = er.filter(r=>r.attending);
          const dec = er.filter(r=>!r.attending);
          return <div className="space-y-3">
            <div>
              <h4 className="text-green-400 font-semibold text-sm mb-2">✓ {t.events.rsvpAttendees} ({att.length})</h4>
              {att.length===0 ? <p className="text-xs text-gray-500">{t.common.noData}</p> : att.map(r=>(
                <div key={r.id} className="flex items-center gap-2 py-1 text-sm text-gray-300"><Icon name="check" size={14} className="text-green-400"/>{r.userName}</div>
              ))}
            </div>
            <div className="border-t border-dark-700 pt-3">
              <h4 className="text-red-400 font-semibold text-sm mb-2">✗ {t.events.rsvpDeclined} ({dec.length})</h4>
              {dec.length===0 ? <p className="text-xs text-gray-500">{t.common.noData}</p> : dec.map(r=>(
                <div key={r.id} className="py-1.5 text-sm">
                  <div className="flex items-center gap-2 text-gray-300"><Icon name="x" size={14} className="text-red-400"/>{r.userName}</div>
                  {r.reason && <p className="text-xs text-gray-500 ml-6 mt-0.5">{r.reason}</p>}
                  {!r.reason && <p className="text-xs text-gray-600 ml-6 mt-0.5 italic">{t.events.noReason}</p>}
                </div>
              ))}
            </div>
          </div>;
        })()}
      </Modal>

      <Modal isOpen={!!modal} onClose={()=>setModal(null)} title={modal==='add'?t.events.add:t.events.edit}>
        <div className="space-y-3">
          <Input label={t.events.name} value={form.title||''} onChange={v=>setForm(f=>({...f,title:v}))} required/>
          <div className="grid grid-cols-2 gap-3">
            <Input label={t.events.date} type="date" value={form.date||''} onChange={v=>setForm(f=>({...f,date:v}))} required/>
            <Input label={t.events.time} type="time" value={form.time||''} onChange={v=>setForm(f=>({...f,time:v}))}/>
          </div>
          <Input label={t.events.location} value={form.location||''} onChange={v=>setForm(f=>({...f,location:v}))}/>
          <Select label={t.events.type} value={form.type||'worship'} onChange={v=>setForm(f=>({...f,type:v}))} options={typeOpts}/>
          <Textarea label={t.events.description} value={form.description||''} onChange={v=>setForm(f=>({...f,description:v}))} rows={3}/>
        </div>
        <div className="flex justify-end gap-3 mt-5">
          <Btn variant="ghost" onClick={()=>setModal(null)}>{t.common.cancel}</Btn>
          <Btn variant="gold" onClick={handleSave}><Icon name="save" size={15}/>{t.common.save}</Btn>
        </div>
      </Modal>

      <ConfirmModal isOpen={!!confirm} message={t.events.confirmDelete}
        onConfirm={()=>{updateData('events',data.events.filter(e=>e.id!==confirm));setConfirm(null);}}
        onCancel={()=>setConfirm(null)} t={t}/>
    </div>
  );
};

  const [filter, setFilter] = useState('all');
  const [period, setPeriod] = useState('month');

  const monthStr = `${now.getFullYear()}-${String(now.getMonth()+1).padStart(2,'0')}`;

  const shown = filter==='all' ? periodFiltered : filter==='income' ? periodFiltered.filter(f=>f.type!=='expense') : periodFiltered.filter(f=>f.type==='expense');
  const sorted = [...shown].sort((a,b)=>new Date(b.date)-new Date(a.date));

  const totalIncome = periodFiltered.filter(f=>f.type!=='expense').reduce((s,f)=>s+Number(f.amount),0);
  const totalExpenses = periodFiltered.filter(f=>f.type==='expense').reduce((s,f)=>s+Number(f.amount),0);
  const balance = totalIncome - totalExpenses;

  const typeColors = { tithe:'badge-blue', offering:'badge-green', donation:'badge-purple', expense:'badge-red' };
  const typeLabel = (type) => {
    const m = { tithe:t.finance.tithe, offering:t.finance.offering, donation:t.finance.donation, expense:t.finance.expense };
    return m[type]||type;
  };

  const openAdd = () => {

  const handleSave = () => {
    if (!form.amount || !form.date) return;

        </div>
        <div className="card p-5 border-l-4 border-red-500">
          <div className="text-sm text-gray-500 mb-1">{t.finance.totalExpenses}</div>
          <div className="text-2xl font-bold text-red-400">{formatCurrency(totalExpenses)}</div>
        </div>
        <div className={`card p-5 border-l-4 ${balance>=0?'border-gold-500':'border-orange-500'}`}>
          <div className="text-sm text-gray-500 mb-1">{t.finance.balance}</div>

        </div>
      </div>

      <div className="card p-4 flex flex-wrap gap-3 items-center justify-between">
        <div className="flex gap-2">
          <div className="flex gap-1 bg-dark-900 rounded-lg p-1">
            {[{v:'month',l:t.finance.thisMonth},{v:'all',l:t.finance.allTime}].map(o=>(
              <button key={o.v} onClick={()=>setPeriod(o.v)} className={`px-3 py-1 rounded-md text-xs font-medium transition-colors ${period===o.v?'bg-dark-700 text-gold-400':'text-gray-500'}`}>{o.l}</button>
            ))}
          </div>
          <div className="flex gap-1 bg-dark-900 rounded-lg p-1">
            {[{v:'all',l:t.finance.filterAll},{v:'income',l:t.finance.filterIncome},{v:'expenses',l:t.finance.filterExpenses}].map(o=>(
              <button key={o.v} onClick={()=>setFilter(o.v)} className={`px-3 py-1 rounded-md text-xs font-medium transition-colors ${filter===o.v?'bg-dark-700 text-gold-400':'text-gray-500'}`}>{o.l}</button>
            ))}
          </div>
        </div>
        <div className="flex gap-2">
          <Btn variant="ghost" onClick={exportFinanceCSV}><Icon name="download" size={14}/>{t.common.exportCSV}</Btn>
          <Btn variant="primary" onClick={openAdd}><Icon name="plus" size={16}/>{t.finance.add}</Btn>
        </div>
      </div>

      <div className="card overflow-hidden">
        {sorted.length === 0
          ? <EmptyState icon="wallet" message={t.finance.noTransactions}/>
          : <div className="overflow-x-auto">
              <table className="w-full text-sm">
                <thead className="bg-dark-900 text-gray-400">
                  <tr>
                    <th className="text-left px-4 py-3 font-medium">{t.finance.date}</th>
                    <th className="text-left px-4 py-3 font-medium">{t.finance.type}</th>
                    <th className="text-left px-4 py-3 font-medium hidden md:table-cell">{t.finance.description}</th>
                    <th className="text-left px-4 py-3 font-medium hidden lg:table-cell">{t.finance.member}</th>
                    <th className="text-right px-4 py-3 font-medium">{t.finance.amount}</th>
                    <th className="text-right px-4 py-3 font-medium">{t.common.actions}</th>
                  </tr>
                </thead>
                <tbody className="divide-y divide-dark-700">
                  {sorted.map(f=>{
                    const member = data.members.find(m=>m.id===f.memberId);
                    const isExpense = f.type==='expense';
                    return (
                      <tr key={f.id} className="table-row">
                        <td className="px-4 py-3 text-gray-400">{formatDate(f.date)}</td>
                        <td className="px-4 py-3"><span className={`badge ${typeColors[f.type]||'badge-gray'}`}>{typeLabel(f.type)}</span></td>
                        <td className="px-4 py-3 text-gray-400 hidden md:table-cell max-w-xs truncate">{f.description}</td>
                        <td className="px-4 py-3 text-gray-500 hidden lg:table-cell">{member?`${member.firstName} ${member.lastName}`:'—'}</td>
                        <td className={`px-4 py-3 text-right font-bold ${isExpense?'text-red-400':'text-green-400'}`}>{isExpense?'-':'+'}{formatCurrency(f.amount)}</td>
                        <td className="px-4 py-3">
                          <div className="flex items-center justify-end gap-1">
                            <button onClick={()=>{setForm({...f,memberId:f.memberId||''});setModal('edit');}} className="p-1.5 hover:bg-gold-500/10 rounded-lg text-gold-500"><Icon name="edit" size={14}/></button>

                </tbody>

        }
      </div>

      <Modal isOpen={!!modal} onClose={()=>setModal(null)} title={modal==='add'?t.finance.add:t.finance.edit}>
        <div className="space-y-3">
          <Input label={t.finance.date} type="date" value={form.date||''} onChange={v=>setForm(f=>({...f,date:v}))} required/>

          <Input label={t.finance.amount} type="number" value={form.amount||''} onChange={v=>setForm(f=>({...f,amount:v}))} required/>

          <Select label={t.finance.member} value={form.memberId||''} onChange={v=>setForm(f=>({...f,memberId:v}))} options={memberOpts}/>
        </div>
        <div className="flex justify-end gap-3 mt-5">
          <Btn variant="ghost" onClick={()=>setModal(null)}>{t.common.cancel}</Btn>
          <Btn variant="gold" onClick={handleSave}><Icon name="save" size={15}/>{t.common.save}</Btn>
        </div>
      </Modal>

      <ConfirmModal isOpen={!!confirm} message={t.finance.confirmDelete}
        onConfirm={()=>{updateData('finance',data.finance.filter(f=>f.id!==confirm));setConfirm(null);}}
        onCancel={()=>setConfirm(null)} t={t}/>
    </div>
  );
};

// =====================================================================
// VIDEO HELPERS
// =====================================================================
const getVideoEmbedUrl = (url) => {
  if (!url) return null;
  // YouTube
  let m = url.match(/(?:youtube\.com\/(?:watch\?v=|embed\/)|youtu\.be\/)([a-zA-Z0-9_-]{11})/);
  if (m) return `https://www.youtube.com/embed/${m[1]}`;
  // Vimeo
  m = url.match(/vimeo\.com\/(\d+)/);
  if (m) return `https://player.vimeo.com/video/${m[1]}`;
  // Direct video file
  if (/\.(mp4|webm|ogg)(\?|$)/i.test(url)) return url;
  return null;
};

const getVideoThumbnail = (url) => {
  if (!url) return null;
  const m = url.match(/(?:youtube\.com\/(?:watch\?v=|embed\/)|youtu\.be\/)([a-zA-Z0-9_-]{11})/);
  if (m) return `https://img.youtube.com/vi/${m[1]}/mqdefault.jpg`;
  return null;
};

const isValidMediaUrl = (url) => {
  if (!url) return false;
  return /youtube\.com|youtu\.be|vimeo\.com|\.(mp4|webm|ogg|pdf)/i.test(url);
};
const isValidVideoUrl = isValidMediaUrl;

const isPdfUrl = (url) => /\.pdf(\?|$)/i.test(url || '');

const formatDuration = (seconds) => {
  if (!seconds) return '0:00';
  const m = Math.floor(seconds / 60);
  const s = seconds % 60;
  return `${m}:${String(s).padStart(2,'0')}`;
};

const VideoPlayerModal = ({ video, isOpen, onClose, t }) => {
  if (!isOpen || !video) return null;
  const embedUrl = getVideoEmbedUrl(video.url_video);
  const isDirectVideo = /\.(mp4|webm|ogg)(\?|$)/i.test(video.url_video);

  return (
    <div className="modal-backdrop" onClick={onClose}>
      <div className="modal p-0 fade-in" style={{maxWidth:'800px'}} onClick={e=>e.stopPropagation()}>
        <div className="flex items-center justify-between p-4 border-b border-dark-700">
          <div>
            <h3 className="font-bold text-white">{video.titulo}</h3>
            <div className="flex items-center gap-2 mt-1">
              <span className={`badge ${video.tipo==='tutorial'?'badge-blue':'badge-purple'}`}>{video.tipo==='tutorial'?t.courses.tutorial:t.courses.teaching}</span>
              <span className="text-xs text-gray-500"><Icon name="clock" size={12} className="inline mr-1"/>{formatDuration(video.duracion_segundos)}</span>
            </div>
          </div>
          <button onClick={onClose} className="text-gray-500 hover:text-white"><Icon name="close" size={20}/></button>

          {isPdfUrl(video.url_video) ? (
            <iframe src={video.url_video} className="w-full h-full" frameBorder="0"/>
          ) : isDirectVideo ? (
            <video controls autoPlay className="w-full h-full" src={video.url_video}/>
          ) : embedUrl ? (
            <iframe src={embedUrl} className="w-full h-full" allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture" allowFullScreen frameBorder="0"/>
          ) : (

};

const CourseDetail = ({ course, data, updateData, t, currentUser, onBack }) => {
  const [videoModal, setVideoModal] = useState(null);
  const [addVideoModal, setAddVideoModal] = useState(null);
  const [playerVideo, setPlayerVideo] = useState(null);
  const [confirm, setConfirm] = useState(null);
  const [vForm, setVForm] = useState({});

  const canEdit = currentUser?.role === 'superadmin' || currentUser?.role === 'admin' ||
    (currentUser?.role === 'ministry_leader' && course.lider_id === currentUser.id);

  const videos = (data.videoLessons||[])
    .filter(v => v.curso_id === course.id)
    .sort((a,b) => a.orden - b.orden);

  const userProgress = (data.videoProgress||[]).filter(p => p.userId === currentUser?.id && p.cursoId === course.id);
  const watchedIds = userProgress.map(p => p.videoId);
  const progressPct = videos.length > 0 ? Math.round((watchedIds.length / videos.length) * 100) : 0;

  const creator = (data.users||[]).find(u => u.id === course.lider_id);

  const openAddVideo = () => {
    setVForm({ titulo:'', descripcion:'', url_video:'', duracion_segundos:90, tipo:'teaching', miniatura_url:'', orden: videos.length + 1 });
    setAddVideoModal('add');
  };

  const openEditVideo = (v) => {
    setVForm({...v});
    setAddVideoModal('edit');
  };

  const handleSaveVideo = () => {
    if (!vForm.titulo?.trim()) return;
    if (!isValidVideoUrl(vForm.url_video)) return;
    if (addVideoModal === 'add') {
      const newVideo = { ...vForm, id: Date.now(), curso_id: course.id, fecha_creacion: today };
      updateData('videoLessons', [...(data.videoLessons||[]), newVideo]);
    } else {
      updateData('videoLessons', (data.videoLessons||[]).map(v => v.id === vForm.id ? vForm : v));
    }
    setAddVideoModal(null);
  };

  const deleteVideo = (id) => {
    updateData('videoLessons', (data.videoLessons||[]).filter(v => v.id !== id));
    updateData('videoProgress', (data.videoProgress||[]).filter(p => p.videoId !== id));
    setConfirm(null);
  };

  const moveVideo = (videoId, direction) => {
    const sorted = [...videos];
    const idx = sorted.findIndex(v => v.id === videoId);
    if ((direction === -1 && idx === 0) || (direction === 1 && idx === sorted.length - 1)) return;
    const swapIdx = idx + direction;
    const tempOrder = sorted[idx].orden;
    sorted[idx] = { ...sorted[idx], orden: sorted[swapIdx].orden };
    sorted[swapIdx] = { ...sorted[swapIdx], orden: tempOrder };
    const updated = (data.videoLessons||[]).map(v => {
      const changed = sorted.find(s => s.id === v.id);
      return changed ? changed : v;
    });
    updateData('videoLessons', updated);
  };

  const toggleWatched = (videoId) => {
    const existing = (data.videoProgress||[]).find(p => p.userId === currentUser?.id && p.videoId === videoId);
    if (existing) {
      updateData('videoProgress', (data.videoProgress||[]).filter(p => p.id !== existing.id));
    } else {
      updateData('videoProgress', [...(data.videoProgress||[]), { id: Date.now(), userId: currentUser?.id, videoId, cursoId: course.id, watchedAt: today }]);
    }
  };

  return (
    <div className="space-y-4 fade-in">
      {/* Header */}
      <div className="card p-4">
        <div className="flex items-center gap-3 mb-3">
          <button onClick={onBack} className="text-gold-400 hover:text-gold-500 flex items-center gap-1">
            <Icon name="arrow_left" size={18}/><span className="text-sm font-medium">{t.courses.backToCourses}</span>
          </button>
        </div>
        <div className="flex items-start justify-between">
          <div>
            <h2 className="text-xl font-bold text-gold-400">{course.titulo}</h2>
            {course.descripcion && <p className="text-sm text-gray-400 mt-1">{course.descripcion}</p>}
            <div className="flex items-center gap-3 mt-2">
              <span className="text-xs text-gray-500"><Icon name="video" size={13} className="inline mr-1"/>{videos.length} {t.courses.totalVideos}</span>
              {creator && <span className="text-xs text-gray-500"><Icon name="user" size={13} className="inline mr-1"/>{t.courses.createdBy} {creator.firstName} {creator.lastName}</span>}
              <span className={`badge ${course.activo ? 'badge-green' : 'badge-gray'}`}>{course.activo ? t.courses.active : t.courses.inactive}</span>
            </div>
          </div>
          {canEdit && <Btn variant="primary" onClick={openAddVideo}><Icon name="plus" size={16}/>{t.courses.addVideo}</Btn>}
        </div>
      </div>

      {/* Progress Bar */}
      <div className="card p-4">
        <div className="flex items-center justify-between mb-2">
          <span className="text-sm font-medium text-gray-300">{t.courses.progress}</span>
          <span className="text-sm text-gold-400 font-bold">{watchedIds.length}/{videos.length} {t.courses.videosWatched}</span>
        </div>
        <div className="progress-bar">
          <div className="progress-fill bg-gradient-to-r from-gold-500 to-gold-400" style={{width:`${progressPct}%`}}/>
        </div>
      </div>

      {/* Video List */}
      {videos.length === 0
        ? <div className="card"><EmptyState icon="video" message={t.courses.noVideos}/></div>
        : <div className="space-y-2">
            {videos.map((v, idx) => {
              const thumb = v.miniatura_url || getVideoThumbnail(v.url_video);
              const isWatched = watchedIds.includes(v.id);
              return (
                <div key={v.id} className={`card p-4 flex items-center gap-4 hover:border-gold-500/30 border border-transparent transition-colors ${isWatched ? 'opacity-75' : ''}`}>
                  {/* Thumbnail / Play */}
                  <div className="relative flex-shrink-0 w-28 h-20 bg-dark-900 rounded-lg overflow-hidden cursor-pointer group" onClick={()=>setPlayerVideo(v)}>
                    {thumb ? (
                      <img src={thumb} alt="" className="w-full h-full object-cover"/>
                    ) : (
                      <div className="w-full h-full flex items-center justify-center"><Icon name={isPdfUrl(v.url_video)?'book':'film'} size={24} className="text-gray-600"/></div>
                    )}
                    <div className="absolute inset-0 bg-black/40 flex items-center justify-center opacity-0 group-hover:opacity-100 transition-opacity">
                      <div className="w-10 h-10 rounded-full bg-gold-500/90 flex items-center justify-center">
                        <Icon name="play" size={16} className="text-dark-900 ml-0.5"/>
                      </div>
                    </div>
                    <div className="absolute bottom-1 right-1 bg-black/70 text-white text-[10px] px-1.5 py-0.5 rounded font-mono">{formatDuration(v.duracion_segundos)}</div>
                  </div>

                  {/* Info */}
                  <div className="flex-1 min-w-0">
                    <div className="flex items-center gap-2">
                      <h4 className="font-semibold text-white text-sm truncate">{v.titulo}</h4>
                      {isWatched && <Icon name="check_circle" size={15} className="text-green-400 flex-shrink-0"/>}
                    </div>
                    {v.descripcion && <p className="text-xs text-gray-500 truncate mt-0.5">{v.descripcion}</p>}
                    <div className="flex items-center gap-2 mt-1">
                      <span className={`badge text-[10px] ${v.tipo==='tutorial'?'badge-blue':v.tipo==='document'?'badge-yellow':'badge-purple'}`}>{v.tipo==='tutorial'?t.courses.tutorial:v.tipo==='document'?'PDF':t.courses.teaching}</span>
                      <span className="text-[10px] text-gray-600">#{idx+1}</span>
                    </div>
                  </div>

                  {/* Actions */}
                  <div className="flex items-center gap-1 flex-shrink-0">
                    <button onClick={()=>toggleWatched(v.id)} title={isWatched?t.courses.unmarkWatched:t.courses.markWatched}
                      className={`p-2 rounded-lg transition-colors ${isWatched?'text-green-400 hover:bg-green-900/20':'text-gray-500 hover:bg-dark-700'}`}>
                      <Icon name="check_circle" size={16}/>
                    </button>
                    <button onClick={()=>setPlayerVideo(v)} className="p-2 rounded-lg text-gold-400 hover:bg-gold-500/10">
                      <Icon name="play" size={16}/>
                    </button>
                    {canEdit && <>
                      <button onClick={()=>moveVideo(v.id,-1)} className="p-1.5 rounded text-gray-500 hover:bg-dark-700" title={t.courses.moveUp}><Icon name="arrow_up" size={14}/></button>
                      <button onClick={()=>moveVideo(v.id,1)} className="p-1.5 rounded text-gray-500 hover:bg-dark-700" title={t.courses.moveDown}><Icon name="arrow_down" size={14}/></button>
                      <button onClick={()=>openEditVideo(v)} className="p-2 rounded-lg text-gray-400 hover:bg-dark-700"><Icon name="edit" size={14}/></button>
                      <button onClick={()=>setConfirm(v.id)} className="p-2 rounded-lg text-red-400 hover:bg-red-900/20"><Icon name="trash" size={14}/></button>
                    </>}
                  </div>
                </div>
              );
            })}
          </div>
      }

      {/* Video Player Modal */}
      <VideoPlayerModal video={playerVideo} isOpen={!!playerVideo} onClose={()=>setPlayerVideo(null)} t={t}/>

      {/* Add/Edit Video Modal */}
      <Modal isOpen={!!addVideoModal} onClose={()=>setAddVideoModal(null)} title={addVideoModal==='add'?t.courses.addVideo:t.courses.editVideo} maxWidth="max-w-lg">
        <div className="space-y-3">
          <Input label={t.courses.videoTitle} value={vForm.titulo||''} onChange={v=>setVForm(f=>({...f,titulo:v}))} required/>
          <Textarea label={t.courses.videoDesc} value={vForm.descripcion||''} onChange={v=>setVForm(f=>({...f,descripcion:v}))}/>
          <Input label={t.courses.videoUrl} value={vForm.url_video||''} onChange={v=>setVForm(f=>({...f,url_video:v}))} placeholder="https://youtube.com/watch?v=... or .pdf URL" required/>
          {vForm.url_video && !isValidVideoUrl(vForm.url_video) && <p className="text-xs text-red-400">{t.courses.invalidUrl}</p>}
          <div className="grid grid-cols-2 gap-3">
            <div>
              <Input label={t.courses.duration} type="number" value={vForm.duracion_segundos||''} onChange={v=>setVForm(f=>({...f,duracion_segundos:parseInt(v)||0}))}/>
              {vForm.duracion_segundos > 180 && <p className="text-xs text-yellow-400 mt-1">{t.courses.durationWarning}</p>}
            </div>
            <Select label={t.courses.type} value={vForm.tipo||'teaching'} onChange={v=>setVForm(f=>({...f,tipo:v}))}
              options={[{value:'teaching',label:t.courses.teaching},{value:'tutorial',label:t.courses.tutorial},{value:'document',label:'PDF'}]}/>
          </div>
          <Input label={t.courses.thumbnail} value={vForm.miniatura_url||''} onChange={v=>setVForm(f=>({...f,miniatura_url:v}))} placeholder="https://..."/>
        </div>
        <div className="flex justify-end gap-3 mt-5">
          <Btn variant="ghost" onClick={()=>setAddVideoModal(null)}>{t.common.cancel}</Btn>
          <Btn variant="gold" onClick={handleSaveVideo}><Icon name="save" size={15}/>{t.common.save}</Btn>
        </div>
      </Modal>

      <ConfirmModal isOpen={!!confirm} message={t.courses.confirmDeleteVideo}
        onConfirm={()=>deleteVideo(confirm)} onCancel={()=>setConfirm(null)} t={t}/>
    </div>
  );
};
